services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todoer-app
    expose:
      - "3000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./todoer.db:/app/todoer.db
    environment:
      - NODE_ENV=production
      - PORT=3000
      - VIRTUAL_HOST=entityy.site
      - LETSENCRYPT_HOST=entityy.site
      - LETSENCRYPT_EMAIL=jonaleece@gmail.com
      - BREVO_USER=${BREVO_USER}
      - BREVO_KEY=${BREVO_KEY}
      - BREVO_FROM=${BREVO_FROM}
      - APP_URL=https://entityy.site
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: todoer-admin
    expose:
      - "3001"
    volumes:
      - ./todoer.db:/app/todoer.db:ro
      - ./uploads:/app/uploads:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
      - VIRTUAL_HOST=admin.entityy.site
      - LETSENCRYPT_HOST=admin.entityy.site
      - LETSENCRYPT_EMAIL=jonaleece@gmail.com
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost.d:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
    restart: unless-stopped

  letsencrypt-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/etc/nginx/certs:rw
      - ./acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=jonaleece@gmail.com
    restart: unless-stopped