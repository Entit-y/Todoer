<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 1rem; }
    .message { background: #1a1a1a; padding: 0.5rem 0.8rem; border-radius: 8px; margin-bottom: 0.5rem; }
    .message .text { word-break: break-word; }
    form { display: flex; padding: 0.75rem; background: #111; border-top: 1px solid #333; }
    input { flex: 1; padding: 0.5rem; background: #222; border: 1px solid #444; color: white; border-radius: 6px; }
    button { margin-left: 0.5rem; padding: 0.5rem 1rem; background: #e8a020; border: none; color: black; font-weight: bold; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="chat-messages"></div>
  <form id="chat-form" autocomplete="off">
    <input id="chat-input" type="text" placeholder="Type a message..." />
    <button type="submit">Send</button>
  </form>

  <script>
    const trustedDomain = window.location.hostname; // e.g., "entityy.site"
    const messagesDiv = document.getElementById('chat-messages');

    // ––– Vulnerable postMessage listener –––
    window.addEventListener("message", (event) => {
      // Weak check: uses includes() – attacker can register
      // "https://entityy.site.attacker.com" and pass the check.
      if (!event.origin.includes(trustedDomain)) return;

      // Process the message and inject directly into the DOM
      const text = event.data?.text || '';
      if (text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        // VULNERABLE: innerHTML without sanitization → XSS
        msgDiv.innerHTML = `<div class="text">${text}</div>`;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
    });

    // Manual send (for testing)
    document.getElementById('chat-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message';
      msgDiv.innerHTML = `<div class="text">${text}</div>`;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      input.value = '';
    });
  </script>
</body>
</html>
