<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Todoer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth">
  <div class="auth-container">
    <div class="auth-card">
      <span class="auth-logo">Todoer</span>
      <h1>Reset password</h1>
      <p class="subtitle">Enter your email and we'll send you a reset link</p>

      <form id="forgotForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
        </div>

        <div id="message" class="message" style="display:none;margin-bottom:16px;"></div>

        <button type="submit" class="btn btn-primary btn-full">Send reset link</button>
      </form>

      <div class="auth-footer">
        <p>Remember it? <a href="/">Sign in</a></p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('message');
      const btn = e.target.querySelector('button[type="submit"]');
      msg.style.display = 'none';
      msg.className = 'message';
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const r = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value })
        });
        const data = await r.json();
        if (r.ok) {
          msg.textContent = data.message;
          msg.className = 'message success';
          document.getElementById('forgotForm').reset();
        } else {
          msg.textContent = data.error || 'Something went wrong.';
          msg.className = 'message error';
        }
      } catch {
        msg.textContent = 'An error occurred. Please try again.';
        msg.className = 'message error';
      }
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Send reset link';
    });
  </script>
</body>
</html>
