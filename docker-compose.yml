services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todoer-app
    expose:
      - "3000"                     # internal port for the proxy
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - VIRTUAL_HOST=entityy.site
      - LETSENCRYPT_HOST=entityy.site
      - LETSENCRYPT_EMAIL=jonaleece@gmail.com
      - BREVO_USER=${BREVO_USER}
      - BREVO_KEY=${BREVO_KEY}
      - BREVO_FROM=${BREVO_FROM}
      - APP_URL=https://entityy.site
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost.d:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
    restart: unless-stopped

  letsencrypt-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/etc/nginx/certs:rw
    environment:
      - DEFAULT_EMAIL=jonaleece@gmail.com
    restart: unless-stopped