<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authorize — Todoer</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    .oauth-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: var(--shadow-md);
    }

    /* ── Logo row ── */
    .oauth-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 28px;
    }

    .oauth-logo img { width: 26px; height: 26px; }

    .oauth-logo-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.02em;
    }

    /* ── Headings ── */
    .oauth-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .oauth-sub {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.55;
      margin-bottom: 22px;
    }

    /* ── App info strip ── */
    .app-strip {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 20px;
    }

    .app-strip-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
    }

    .app-strip-name {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }

    .app-strip-domain {
      font-size: 11.5px;
      color: var(--text-3);
      margin-top: 1px;
    }

    /* ── Scope list ── */
    .scope-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    .scope-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 12.5px;
      color: var(--text-2);
      line-height: 1.5;
    }

    .scope-check {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 1px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #22c55e;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn-allow {
      flex: 1;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
    }

    .btn-allow:hover { background: var(--accent-hover); }
    .btn-allow:active { transform: scale(0.98); }

    .btn-deny {
      flex: 1;
      padding: 10px 16px;
      background: var(--surface-2);
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .btn-deny:hover {
      background: var(--surface-3);
      color: var(--text-1);
      border-color: var(--border-light);
    }

    /* ── Signed-in note ── */
    .oauth-user {
      font-size: 11.5px;
      color: var(--text-3);
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
    }

    .oauth-user a {
      color: var(--text-3);
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.15s;
    }

    .oauth-user a:hover { color: var(--text-2); }

    /* ── Error state ── */
    .oauth-error {
      background: var(--danger-dim);
      border: 1px solid var(--danger-border);
      color: var(--danger);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12.5px;
      margin-bottom: 18px;
      display: none;
    }

    .oauth-error.visible { display: block; }

    @media (max-width: 480px) {
      .oauth-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="oauth-card">

    <div class="oauth-logo">
      <img src="/assets/logo.svg" alt="Todoer">
      <span class="oauth-logo-text">Todoer</span>
    </div>

    <h1 class="oauth-title">Authorize access</h1>
    <p class="oauth-sub">An application is requesting access to your Todoer account.</p>

    <!-- App info strip -->
    <div class="app-strip">
      <div class="app-strip-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div>
        <!--
          VULNERABLE (Vuln 3d): client_id from the URL is written to innerHTML
          without sanitization. The server-side OAUTH_CLIENTS lookup currently
          prevents an unknown client_id from reaching this page. If the client
          registry were ever moved to a DB (a natural future change), a crafted
          client_name stored there would execute here.
        -->
        <div class="app-strip-name" id="appName">Loading…</div>
        <div class="app-strip-domain" id="appDomain"></div>
      </div>
    </div>

    <div class="oauth-error" id="oauthError"></div>

    <!-- Scope list -->
    <ul class="scope-list">
      <li class="scope-item">
        <div class="scope-check">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        Read your account email address and display name
      </li>
      <li class="scope-item">
        <div class="scope-check">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        Read your account ID for ticket linking
      </li>
      <li class="scope-item">
        <div class="scope-check">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        Cannot post, modify, or delete any data in your account
      </li>
    </ul>

    <div class="btn-row">
      <form method="POST" action="/oauth/confirm_access" style="flex:1;" id="allowForm">
        <input type="hidden" name="request_id"  id="fieldRequestId">
        <input type="hidden" name="decision"    value="allow">
        <!-- VULNERABLE (Vuln 3b): redirect_uri in form body, not from stored record -->
        <input type="hidden" name="redirect_uri" id="fieldRedirectUri">
        <input type="hidden" name="state"       id="fieldStateAllow">
        <button type="submit" class="btn-allow" style="width:100%;">Allow</button>
      </form>

      <form method="POST" action="/oauth/confirm_access" style="flex:1;">
        <input type="hidden" name="request_id" id="fieldRequestIdDeny">
        <input type="hidden" name="decision"   value="deny">
        <input type="hidden" name="state"      id="fieldStateDeny">
        <button type="submit" class="btn-deny" style="width:100%;">Deny</button>
      </form>
    </div>

    <p class="oauth-user" id="oauthUserNote">
      Signed in as <strong id="oauthUserEmail">—</strong> ·
      <a href="/profile">Not you?</a>
    </p>

  </div>

  <script>
    // ── Read params from the URL ──
    // /oauth/confirm_access receives these from the redirect issued by /oauth/authorize.
    const params     = new URLSearchParams(location.search);
    const clientId   = params.get('client_id')   || '';
    const redirectUri = params.get('redirect_uri') || '';
    const state      = params.get('state')        || '';
    const requestId  = params.get('request_id')   || '';

    // ── Guard: redirect_id must be present ──
    if (!requestId) {
      document.getElementById('oauthError').textContent = 'Invalid authorization request. Please try again.';
      document.getElementById('oauthError').classList.add('visible');
      document.querySelector('.btn-row').style.display = 'none';
    }

    // ── Populate hidden fields ──
    document.getElementById('fieldRequestId').value     = requestId;
    document.getElementById('fieldRedirectUri').value   = redirectUri;  // Vuln 3b sink
    document.getElementById('fieldStateAllow').value    = state;
    document.getElementById('fieldRequestIdDeny').value = requestId;
    document.getElementById('fieldStateDeny').value     = state;

    const CLIENT_NAMES = { support: 'Todoer Support' };
    const CLIENT_DOMAINS = { support: 'support.entityy.site' };

    const displayName   = CLIENT_NAMES[clientId]   || clientId;
    const displayDomain = CLIENT_DOMAINS[clientId] || '';

    document.getElementById('appName').innerHTML   = displayName;   // Vuln 3d sink
    document.getElementById('appDomain').textContent = displayDomain;

    // ── Show signed-in user ──
    (async () => {
      try {
        const r = await fetch('/api/auth/me');
        if (!r.ok) {
          // Not logged in — redirect back through the login flow
          window.location.href = `/?next=${encodeURIComponent(location.href)}`;
          return;
        }
        const data = await r.json();
        document.getElementById('oauthUserEmail').textContent = data.user.email;
      } catch {
        window.location.href = `/?next=${encodeURIComponent(location.href)}`;
      }
    })();
  </script>

</body>
</html>
