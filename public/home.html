<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — Todoer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand" style="display:flex; align-items:center; gap:8px;">
      <object data="/assets/logo.svg" type="image/svg+xml" style="width:28px; height:28px; pointer-events:none;"></object>
      <span>Todoer</span>
   </div>
    <div class="nav-links">
      <a href="/home" class="nav-link active">Tasks</a>
      <a href="/files" class="nav-link">Files</a>
      <a href="/profile" class="nav-link">Profile</a>
      <span id="navUsername" class="nav-username"></span>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg id="iconSun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="iconMoon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button id="logoutBtn" class="btn btn-secondary" style="margin-left:4px;">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>My Tasks</h1>
      <button class="btn btn-primary" onclick="showTaskModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New task
      </button>
    </div>

    <div class="filters-bar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search tasks…" class="search-input">
        <button class="btn btn-secondary" onclick="loadTasks()">Search</button>
      </div>
      <div class="filter-group">
        <select id="priorityFilter" class="filter-select" onchange="loadTasks()">
          <option value="all">All priorities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select id="statusFilter" class="filter-select" onchange="loadTasks()">
          <option value="">All status</option>
          <option value="false">Pending</option>
          <option value="true">Completed</option>
        </select>
        <select id="sortBy" class="filter-select" onchange="loadTasks()">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="priority">By priority</option>
          <option value="due_date">By due date</option>
        </select>
      </div>
    </div>

    <div id="tasksList" class="tasks-list"></div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:14px;">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/>
      </svg>
      <p>No tasks yet. Create your first one.</p>
    </div>
  </main>

  <!-- Task Modal -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">New task</h2>
        <button class="modal-close" onclick="closeTaskModal()">×</button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <div class="form-group">
          <label for="taskTitle">Title</label>
          <input type="text" id="taskTitle" required placeholder="What needs to be done?">
        </div>
        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" rows="3" placeholder="Add details…"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority" class="form-select">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskDueDate">Due date</label>
            <input type="date" id="taskDueDate">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save task</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let tasks = [];

    // Theme
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeIcon(saved);

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    });

    function updateThemeIcon(theme) {
      document.getElementById('iconSun').style.display  = theme === 'light' ? 'block' : 'none';
      document.getElementById('iconMoon').style.display = theme === 'dark'  ? 'block' : 'none';
    }

    async function checkAuth() {
      try {
        const r = await fetch('/api/auth/me');
        if (!r.ok) { window.location.href = '/'; return; }
        const data = await r.json();
        if (data.user.username) {
          // VULNERABLE: innerHTML — stored XSS if username is a payload
          document.getElementById('navUsername').innerHTML = '@' + data.user.username;
        }
      } catch { window.location.href = '/'; }
    }

    async function loadTasks() {
      const search    = document.getElementById('searchInput').value;
      const priority  = document.getElementById('priorityFilter').value;
      const completed = document.getElementById('statusFilter').value;
      const sort      = document.getElementById('sortBy').value;
      const params    = new URLSearchParams();
      if (search) params.append('search', search);
      if (priority !== 'all') params.append('priority', priority);
      if (completed) params.append('completed', completed);
      params.append('sort', sort);
      try {
        const r = await fetch(`/api/tasks?${params}`);
        tasks = await r.json();
        renderTasks();
      } catch (e) { console.error('Failed to load tasks:', e); }
    }

    function renderTasks() {
      const list  = document.getElementById('tasksList');
      const empty = document.getElementById('emptyState');
      if (!tasks.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.innerHTML = tasks.map(task => `
        <div class="task-card ${task.completed ? 'completed' : ''}" data-id="${task.id}">
          <div class="task-checkbox">
            <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
          </div>
          <div class="task-content">
            <div class="task-title">${escapeHtml(task.title)}</div>
            ${task.description ? `<p class="task-description">${escapeHtml(task.description)}</p>` : ''}
            <div class="task-meta">
              <span class="task-priority priority-${task.priority}">${task.priority}</span>
              ${task.due_date ? `<span class="task-due">Due ${formatDate(task.due_date)}</span>` : ''}
              <span class="task-date">${formatDate(task.created_at)}</span>
            </div>
          </div>
          <div class="task-actions">
            <button class="btn-icon" onclick="editTask(${task.id})" title="Edit">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
            </button>
            <button class="btn-icon btn-danger" onclick="deleteTask(${task.id})" title="Delete">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>`).join('');
    }

    function showTaskModal(task = null) {
      document.getElementById('taskForm').reset();
      document.getElementById('taskId').value = '';
      if (task) {
        document.getElementById('modalTitle').textContent = 'Edit task';
        document.getElementById('taskId').value = task.id;
        document.getElementById('taskTitle').value = task.title;
        document.getElementById('taskDescription').value = task.description || '';
        document.getElementById('taskPriority').value = task.priority;
        document.getElementById('taskDueDate').value = task.due_date ? task.due_date.split('T')[0] : '';
      } else {
        document.getElementById('modalTitle').textContent = 'New task';
      }
      document.getElementById('taskModal').style.display = 'flex';
    }

    function closeTaskModal() { document.getElementById('taskModal').style.display = 'none'; }

    async function editTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) showTaskModal(task);
    }

    async function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      try {
        await fetch(`/api/tasks/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ completed: !task.completed }) });
        loadTasks();
      } catch (e) { console.error(e); }
    }

    async function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      try { await fetch(`/api/tasks/${id}`, { method: 'DELETE' }); loadTasks(); }
      catch (e) { console.error(e); }
    }

    document.getElementById('taskForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id   = document.getElementById('taskId').value;
      const data = {
        title:       document.getElementById('taskTitle').value,
        description: document.getElementById('taskDescription').value,
        priority:    document.getElementById('taskPriority').value,
        due_date:    document.getElementById('taskDueDate').value || null
      };
      try {
        if (id) {
          await fetch(`/api/tasks/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        } else {
          await fetch('/api/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        }
        closeTaskModal();
        loadTasks();
      } catch (e) { console.error(e); }
    });

    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') loadTasks(); });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function formatDate(s) {
      if (!s) return '';
      return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    checkAuth();
    loadTasks();
  </script>
</body>
</html>
