<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Files - Todoer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Todoer</div>
    <div class="nav-links">
      <a href="/home" class="nav-link">Tasks</a>
      <a href="/files" class="nav-link active">Files</a>
      <a href="/profile" class="nav-link">Profile</a>
      <span id="navUsername" style="color:var(--amber);font-size:0.8rem;font-weight:500;padding:0 4px;"></span>
      <button id="logoutBtn" class="btn btn-secondary" style="margin-left:8px;">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>My Files</h1>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="showCreateArchiveModal()">Create Archive</button>
        <label class="btn btn-primary upload-btn">
          Upload File
          <input type="file" id="fileInput" style="display: none;" onchange="uploadFile(this.files[0])" accept="image/*">
        </label>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search files..." class="search-input">
      <button class="btn btn-secondary" onclick="loadFiles()">Search</button>
    </div>

    <div id="filesList" class="files-grid"></div>
    
    <div id="emptyState" class="empty-state" style="display: none;">
      <p>No files found. Upload your first file!</p>
    </div>
  </main>

  <!-- Image Viewer Modal -->
  <div id="imageViewerModal" class="image-viewer-modal">
    <div class="image-viewer-content">
      <div class="image-viewer-header">
        <h3 id="imageViewerTitle">Image</h3>
        <div class="image-viewer-controls">
          <button class="btn-icon" onclick="zoomIn()" title="Zoom In">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              <line x1="11" y1="8" x2="11" y2="14"></line>
              <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
          </button>
          <button class="btn-icon" onclick="zoomOut()" title="Zoom Out">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
          </button>
          <button class="btn-icon" onclick="resetZoom()" title="Reset Zoom">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </button>
          <button class="btn-icon" onclick="closeImageViewer()" title="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
      <div class="image-viewer-body" id="imageViewerBody">
        <img id="imageViewerImg" src="" alt="Image">
      </div>
      <div class="image-viewer-footer">
        <span id="imageZoomLevel">100%</span>
        <span id="imageFileName"></span>
      </div>
    </div>
  </div>

  <!-- Create Archive Modal -->
  <div id="archiveModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create Archive</h2>
        <button class="modal-close" onclick="closeArchiveModal()">&times;</button>
      </div>
      <form id="archiveForm">
        <div class="form-group">
          <label for="archiveName">Archive Name</label>
          <input type="text" id="archiveName" placeholder="my-archive.zip">
        </div>
        <div class="form-group">
          <label>Selected Files (<span id="selectedCount">0</span>)</label>
          <div id="selectedFilesList" class="selected-files-list"></div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeArchiveModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Archive</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let files = [];
    let selectedFiles = [];
    let currentZoom = 100;
    let currentImageFile = null;
    
    const imageExtensions = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp', 'svg', 'ico', 'tiff', 'tif'];
    
    async function checkAuth() {
      try {
        const r = await fetch('/api/auth/me');
        if (!r.ok) { window.location.href = '/'; return; }
        const data = await r.json();
        if (data.user.username) {
          // VULNERABLE: innerHTML — XSS vector
          document.getElementById('navUsername').innerHTML = '@' + data.user.username;
        }
      } catch { window.location.href = '/'; }
    }
    
    async function loadFiles() {
      const search = document.getElementById('searchInput').value;
      const params = new URLSearchParams();
      if (search) params.append('search', search);
      
      try {
        const response = await fetch(`/api/files?${params.toString()}`);
        files = await response.json();
        renderFiles();
      } catch (error) {
        console.error('Failed to load files:', error);
      }
    }
    
    function isImageFile(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      return imageExtensions.includes(ext);
    }
    
    function renderFiles() {
      const filesList = document.getElementById('filesList');
      const emptyState = document.getElementById('emptyState');
      
      if (files.length === 0) {
        filesList.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }
      
      emptyState.style.display = 'none';
      filesList.innerHTML = files.map(file => `
        <div class="file-card ${file.extracted_from ? 'extracted-file' : ''}" data-id="${file.id}">
          <div class="file-icon">
            ${getFileIcon(file.original_name)}
          </div>
          <div class="file-info">
            <h3 class="file-name" title="${escapeHtml(file.original_name)}">${escapeHtml(file.original_name)}</h3>
            <p class="file-size">${formatFileSize(file.size)}</p>
            <p class="file-date">${formatDate(file.created_at)}</p>
            ${file.extracted_from ? `<p class="file-source">Extracted from: ${escapeHtml(file.extracted_from)}</p>` : ''}
          </div>
          <div class="file-actions">
            ${isImageFile(file.original_name) ? `
              <button class="btn-icon" onclick="viewImage(${file.id})" title="View Image">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            ` : ''}
            <button class="btn-icon" onclick="downloadFile(${file.id})" title="Download">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
            </button>
            ${isArchive(file.original_name) && !file.extracted_from ? `
              <button class="btn-icon" onclick="extractArchive(${file.id})" title="Extract">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 8v13H3V8"></path>
                  <path d="M1 3h22v5H1z"></path>
                  <path d="M10 12h4"></path>
                </svg>
              </button>
            ` : ''}
            <button class="btn-icon btn-danger" onclick="deleteFile(${file.id})" title="Delete">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          </div>
        </div>
      `).join('');
    }
    
    // Image Viewer Functions
    function viewImage(fileId) {
      const file = files.find(f => f.id === fileId);
      if (!file) return;
      
      currentImageFile = file;
      currentZoom = 100;
      
      const modal = document.getElementById('imageViewerModal');
      const img = document.getElementById('imageViewerImg');
      const title = document.getElementById('imageViewerTitle');
      const fileName = document.getElementById('imageFileName');
      
      title.textContent = escapeHtml(file.original_name);
      fileName.textContent = `${formatFileSize(file.size)}`;
      
      // Load image with cache busting
      img.src = `/api/files/${fileId}/download?t=${Date.now()}`;
      img.style.transform = `scale(${currentZoom / 100})`;
      
      document.getElementById('imageZoomLevel').textContent = `${currentZoom}%`;
      modal.style.display = 'flex';
    }
    
    function closeImageViewer() {
      const modal = document.getElementById('imageViewerModal');
      modal.style.display = 'none';
      document.getElementById('imageViewerImg').src = '';
      currentImageFile = null;
      currentZoom = 100;
    }
    
    function zoomIn() {
      if (currentZoom < 300) {
        currentZoom += 25;
        updateZoom();
      }
    }
    
    function zoomOut() {
      if (currentZoom > 25) {
        currentZoom -= 25;
        updateZoom();
      }
    }
    
    function resetZoom() {
      currentZoom = 100;
      updateZoom();
    }
    
    function updateZoom() {
      const img = document.getElementById('imageViewerImg');
      img.style.transform = `scale(${currentZoom / 100})`;
      document.getElementById('imageZoomLevel').textContent = `${currentZoom}%`;
    }
    
    // Close modal on escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeImageViewer();
        closeArchiveModal();
      }
    });
    
    // Close modal on background click
    document.getElementById('imageViewerModal').addEventListener('click', (e) => {
      if (e.target.id === 'imageViewerModal') {
        closeImageViewer();
      }
    });
    
    function getFileIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const icons = {
        pdf: '<svg width="48" height="48" viewBox="0 0 24 24" fill="#e74c3c" stroke="#c0392b" stroke-width="1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>',
        zip: '<svg width="48" height="48" viewBox="0 0 24 24" fill="#f39c12" stroke="#d68910" stroke-width="1"><path d="M21 8v13H3V8"></path><path d="M1 3h22v5H1z"></path><path d="M10 12h4"></path></svg>',
        txt: '<svg width="48" height="48" viewBox="0 0 24 24" fill="#3498db" stroke="#2980b9" stroke-width="1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>',
        // Image icon
        jpg: '<svg width="48" height="48" viewBox="0 0 24 24" fill="#9b59b6" stroke="#8e44ad" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
        jpeg: '<svg width="48" height="48" viewBox="0 0 24 24" fill="#9b59b6" stroke="#8e44ad" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
        png: '<svg width="48" height="48" viewBox="0 0 24 24" fill="#9b59b6" stroke="#8e44ad" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
        gif: '<svg width="48" height="48" viewBox="0 0 24 24" fill="#9b59b6" stroke="#8e44ad" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
        webp: '<svg width="48" height="48" viewBox="0 0 24 24" fill="#9b59b6" stroke="#8e44ad" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
        svg: '<svg width="48" height="48" viewBox="0 0 24 24" fill="#9b59b6" stroke="#8e44ad" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
        default: '<svg width="48" height="48" viewBox="0 0 24 24" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>'
      };
      return icons[ext] || icons.default;
    }
    
    function isArchive(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      return ['zip', 'rar', '7z', 'tar', 'gz'].includes(ext);
    }
    
    async function uploadFile(file) {
      if (!file) return;
      
      const formData = new FormData();
      formData.append('file', file);
      
      try {
        const response = await fetch('/api/files/upload', {
          method: 'POST',
          body: formData
        });
        
        if (response.ok) {
          loadFiles();
        } else {
          alert('Failed to upload file');
        }
      } catch (error) {
        console.error('Upload failed:', error);
        alert('Upload failed');
      }
      
      document.getElementById('fileInput').value = '';
    }
    
    async function downloadFile(id) {
      window.location.href = `/api/files/${id}/download`;
    }
    
    async function extractArchive(id) {
      if (!confirm('Extract this archive?')) return;
      
      try {
        const response = await fetch(`/api/files/extract/${id}`, {
          method: 'POST'
        });
        const data = await response.json();
        
        if (response.ok) {
          alert(`Archive extracted successfully!\nFiles extracted: ${data.files.length}`);
          loadFiles();
        } else {
          alert(data.error || 'Extraction failed');
        }
      } catch (error) {
        console.error('Extraction failed:', error);
        alert('Extraction failed');
      }
    }
    
    async function deleteFile(id) {
      if (!confirm('Are you sure you want to delete this file?')) return;
      
      try {
        await fetch(`/api/files/${id}`, { method: 'DELETE' });
        loadFiles();
      } catch (error) {
        console.error('Delete failed:', error);
      }
    }
    
    function showCreateArchiveModal() {
      selectedFiles = [];
      renderSelectedFiles();
      document.getElementById('archiveModal').style.display = 'flex';
    }
    
    function closeArchiveModal() {
      document.getElementById('archiveModal').style.display = 'none';
    }
    
    function toggleFileSelection(id) {
      const index = selectedFiles.indexOf(id);
      if (index === -1) {
        selectedFiles.push(id);
      } else {
        selectedFiles.splice(index, 1);
      }
      renderSelectedFiles();
    }
    
    function renderSelectedFiles() {
      const list = document.getElementById('selectedFilesList');
      const count = document.getElementById('selectedCount');
      count.textContent = selectedFiles.length;
      
      const selectedFileObjects = files.filter(f => selectedFiles.includes(f.id));
      list.innerHTML = selectedFileObjects.map(f => `
        <div class="selected-file-item">
          <span>${escapeHtml(f.original_name)}</span>
          <button type="button" onclick="toggleFileSelection(${f.id})">&times;</button>
        </div>
      `).join('');
    }
    
    document.getElementById('archiveForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (selectedFiles.length === 0) {
        alert('Please select at least one file');
        return;
      }
      
      try {
        const response = await fetch('/api/files/create-archive', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fileIds: selectedFiles,
            archiveName: document.getElementById('archiveName').value || `archive-${Date.now()}.zip`
          })
        });
        
        if (response.ok) {
          closeArchiveModal();
          loadFiles();
          alert('Archive created successfully!');
        } else {
          alert('Failed to create archive');
        }
      } catch (error) {
        console.error('Archive creation failed:', error);
        alert('Failed to create archive');
      }
    });
    
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadFiles();
    });
    
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function formatFileSize(bytes) {
      if (!bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    
    checkAuth();
    loadFiles();
  </script>
</body>
</html>
