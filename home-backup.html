<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Todoer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Todoer</div>
    <div class="nav-links">
      <a href="/home" class="nav-link active">Tasks</a>
      <a href="/files" class="nav-link">Files</a>
      <a href="/profile" class="nav-link">Profile</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">
        <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
      <button id="logoutBtn" class="btn btn-secondary">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>My Tasks</h1>
      <button class="btn btn-primary" onclick="showTaskModal()">Add Task</button>
    </div>

    <div class="filters-bar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search tasks..." class="search-input">
        <button class="btn btn-secondary" onclick="loadTasks()">Search</button>
      </div>
      
      <div class="filter-group">
        <select id="priorityFilter" class="filter-select" onchange="loadTasks()">
          <option value="all">All Priorities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        
        <select id="statusFilter" class="filter-select" onchange="loadTasks()">
          <option value="">All Status</option>
          <option value="false">Pending</option>
          <option value="true">Completed</option>
        </select>
        
        <select id="sortBy" class="filter-select" onchange="loadTasks()">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="priority">By Priority</option>
          <option value="due_date">By Due Date</option>
        </select>
      </div>
    </div>

    <div id="tasksList" class="tasks-list"></div>
    
    <div id="emptyState" class="empty-state" style="display: none;">
      <p>No tasks found. Create your first task!</p>
    </div>
  </main>

  <!-- Task Modal -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add New Task</h2>
        <button class="modal-close" onclick="closeTaskModal()">&times;</button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        
        <div class="form-group">
          <label for="taskTitle">Title *</label>
          <input type="text" id="taskTitle" required placeholder="Task title">
        </div>
        
        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" rows="3" placeholder="Task description"></textarea>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority" class="form-select">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="taskDueDate">Due Date</label>
            <input type="date" id="taskDueDate">
          </div>
        </div>
        
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let tasks = [];
    
    // Theme toggle function
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('darkMode', isDark);
      updateThemeIcon();
    }
    
    function updateThemeIcon() {
      const isDark = document.body.classList.contains('dark-mode');
      const icon = document.getElementById('theme-icon');
      if (isDark) {
        icon.innerHTML = `
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        `;
      } else {
        icon.innerHTML = `
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        `;
      }
    }
    
    function initTheme() {
      const isDark = localStorage.getItem('darkMode') === 'true';
      if (isDark) {
        document.body.classList.add('dark-mode');
      }
      updateThemeIcon();
    }
    
    async function checkAuth() {
      try {
        const response = await fetch('/api/auth/me');
        if (!response.ok) {
          window.location.href = '/';
        }
      } catch (error) {
        window.location.href = '/';
      }
    }
    
    async function loadTasks() {
      const search = document.getElementById('searchInput').value;
      const priority = document.getElementById('priorityFilter').value;
      const completed = document.getElementById('statusFilter').value;
      const sort = document.getElementById('sortBy').value;
      
      const params = new URLSearchParams();
      if (search) params.append('search', search);
      if (priority !== 'all') params.append('priority', priority);
      if (completed) params.append('completed', completed);
      params.append('sort', sort);
      
      try {
        const response = await fetch(`/api/tasks?${params.toString()}`);
        tasks = await response.json();
        renderTasks();
      } catch (error) {
        console.error('Failed to load tasks:', error);
      }
    }
    
    function renderTasks() {
      const tasksList = document.getElementById('tasksList');
      const emptyState = document.getElementById('emptyState');
      
      if (tasks.length === 0) {
        tasksList.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }
      
      emptyState.style.display = 'none';
      tasksList.innerHTML = tasks.map(task => `
        <div class="task-card ${task.completed ? 'completed' : ''}" data-id="${task.id}">
          <div class="task-checkbox">
            <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
          </div>
          <div class="task-content">
            <h3 class="task-title">${escapeHtml(task.title)}</h3>
            ${task.description ? `<p class="task-description">${escapeHtml(task.description)}</p>` : ''}
            <div class="task-meta">
              <span class="task-priority priority-${task.priority}">${task.priority}</span>
              ${task.due_date ? `<span class="task-due">Due: ${formatDate(task.due_date)}</span>` : ''}
              <span class="task-date">Created: ${formatDate(task.created_at)}</span>
            </div>
          </div>
          <div class="task-actions">
            <button class="btn-icon" onclick="editTask(${task.id})" title="Edit">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
            <button class="btn-icon btn-danger" onclick="deleteTask(${task.id})" title="Delete">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          </div>
        </div>
      `).join('');
    }
    
    function showTaskModal(task = null) {
      const modal = document.getElementById('taskModal');
      const form = document.getElementById('taskForm');
      const title = document.getElementById('modalTitle');
      
      form.reset();
      document.getElementById('taskId').value = '';
      
      if (task) {
        title.textContent = 'Edit Task';
        document.getElementById('taskId').value = task.id;
        document.getElementById('taskTitle').value = task.title;
        document.getElementById('taskDescription').value = task.description || '';
        document.getElementById('taskPriority').value = task.priority;
        document.getElementById('taskDueDate').value = task.due_date ? task.due_date.split('T')[0] : '';
      } else {
        title.textContent = 'Add New Task';
      }
      
      modal.style.display = 'flex';
    }
    
    function closeTaskModal() {
      document.getElementById('taskModal').style.display = 'none';
    }
    
    async function editTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        showTaskModal(task);
      }
    }
    
    async function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        try {
          await fetch(`/api/tasks/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ completed: !task.completed })
          });
          loadTasks();
        } catch (error) {
          console.error('Failed to update task:', error);
        }
      }
    }
    
    async function deleteTask(id) {
      if (!confirm('Are you sure you want to delete this task?')) return;
      
      try {
        await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
        loadTasks();
      } catch (error) {
        console.error('Failed to delete task:', error);
      }
    }
    
    document.getElementById('taskForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('taskId').value;
      const data = {
        title: document.getElementById('taskTitle').value,
        description: document.getElementById('taskDescription').value,
        priority: document.getElementById('taskPriority').value,
        due_date: document.getElementById('taskDueDate').value || null
      };
      
      try {
        if (id) {
          await fetch(`/api/tasks/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
        } else {
          await fetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
        }
        closeTaskModal();
        loadTasks();
      } catch (error) {
        console.error('Failed to save task:', error);
      }
    });
    
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadTasks();
    });
    
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });
    
    // Helper functions
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    
    // Initialize
    initTheme();
    checkAuth();
    loadTasks();
  </script>
</body>
</html>
