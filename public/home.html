<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — Todoer</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ── Comments drawer ── */
    .comments-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 900;
    }
    .comments-overlay.open { display: block; }

    .comments-drawer {
      position: fixed;
      top: 0;
      right: -440px;
      width: 440px;
      max-width: 100vw;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      transition: right 0.25s cubic-bezier(0.22,1,0.36,1);
      box-shadow: var(--shadow-lg);
    }
    .comments-drawer.open { right: 0; }

    .drawer-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .drawer-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.02em;
    }

    .drawer-task-title {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }

    .drawer-close {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 20px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .drawer-close:hover { color: var(--text-1); }

    .comments-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .comment-item {
      display: flex;
      gap: 10px;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .comment-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .comment-body { flex: 1; min-width: 0; }

    .comment-meta {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 3px;
    }

    .comment-author {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-1);
    }

    .comment-time {
      font-size: 11px;
      color: var(--text-3);
    }

    .comment-text {
      font-size: 13.5px;
      color: var(--text-2);
      line-height: 1.55;
      word-break: break-word;
    }

    .comment-delete {
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      padding: 2px;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .comment-item:hover .comment-delete { opacity: 1; }
    .comment-delete:hover { color: var(--danger); }

    .comments-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-3);
      font-size: 13px;
    }

    .comment-input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .comment-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .comment-input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 9px 12px;
      color: var(--text-1);
      font-family: var(--font);
      font-size: 13.5px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      min-height: 38px;
      transition: border-color 0.15s;
    }

    .comment-input:focus { border-color: var(--border-light); }
    .comment-input::placeholder { color: var(--text-3); }

    .comment-submit {
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--accent-text);
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .comment-submit:hover { background: var(--accent-hover); }
    .comment-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand" style="display:flex; align-items:center; gap:8px;">
      <object data="/assets/logo.svg" type="image/svg+xml" style="width:28px; height:28px; pointer-events:none;"></object>
      <span>Todoer</span>
    </div>
    <div class="nav-links">
      <a href="/home" class="nav-link">Tasks</a>
      <a href="/feed" class="nav-link">Feed</a>
      <a href="/files" class="nav-link">Files</a>
      <a href="/workspaces" class="nav-link">Workspaces</a>
      <a href="/profile" class="nav-link">Profile</a>
      <span id="navUsername" class="nav-username"></span>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg id="iconSun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="iconMoon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button id="logoutBtn" class="btn btn-secondary" style="margin-left:4px;">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>My Tasks</h1>
      <button class="btn btn-primary" onclick="showTaskModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New task
      </button>
    </div>

    <div class="filters-bar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search tasks…" class="search-input">
        <button class="btn btn-secondary" onclick="loadTasks()">Search</button>
      </div>
      <div class="filter-group">
        <select id="priorityFilter" class="filter-select" onchange="loadTasks()">
          <option value="all">All priorities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select id="statusFilter" class="filter-select" onchange="loadTasks()">
          <option value="">All status</option>
          <option value="false">Pending</option>
          <option value="true">Completed</option>
        </select>
        <select id="sortBy" class="filter-select" onchange="loadTasks()">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="priority">By priority</option>
          <option value="due_date">By due date</option>
        </select>
      </div>
    </div>

    <div id="tasksList" class="tasks-list"></div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:14px;">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/>
      </svg>
      <p>No tasks yet. Create your first one.</p>
    </div>
  </main>

  <!-- Task Modal -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">New task</h2>
        <button class="modal-close" onclick="closeTaskModal()">×</button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <div class="form-group">
          <label for="taskTitle">Title</label>
          <input type="text" id="taskTitle" required placeholder="What needs to be done?">
        </div>
        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" rows="3" placeholder="Add details…"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority" class="form-select">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskDueDate">Due date</label>
            <input type="date" id="taskDueDate">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Comments drawer -->
  <div class="comments-overlay" id="commentsOverlay" onclick="closeComments()"></div>
  <div class="comments-drawer" id="commentsDrawer">
    <div class="drawer-header">
      <div>
        <h3>Comments</h3>
        <div class="drawer-task-title" id="drawerTaskTitle"></div>
      </div>
      <button class="drawer-close" onclick="closeComments()">×</button>
    </div>
    <div class="comments-list" id="commentsList"></div>
    <div class="comment-input-area">
      <div class="comment-input-row">
        <textarea class="comment-input" id="commentInput" placeholder="Add a comment…" rows="1"
          onkeydown="handleCommentKey(event)"></textarea>
        <button class="comment-submit" id="commentSubmit" onclick="submitComment()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    let tasks = [];
    let currentUser = null;
    let activeTaskId = null;
    let ws = null;

    // ── Theme ──
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeIcon(saved);

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    });

    function updateThemeIcon(theme) {
      document.getElementById('iconSun').style.display  = theme === 'light' ? 'block' : 'none';
      document.getElementById('iconMoon').style.display = theme === 'dark'  ? 'block' : 'none';
    }

    // ── WebSocket ──
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'task_comment:new' && data.taskId === activeTaskId) {
          appendComment(data.comment);
        }
        if (data.type === 'task_comment:delete' && data.taskId === activeTaskId) {
          document.getElementById(`comment-${data.commentId}`)?.remove();
          checkCommentsEmpty();
        }
      };

      ws.onclose = () => setTimeout(connectWS, 3000);
      ws.onerror = () => ws.close();
    }

    // ── Auth ──
    async function checkAuth() {
      try {
        const r = await fetch('/api/auth/me');
        if (!r.ok) { window.location.href = '/'; return; }
        const data = await r.json();
        currentUser = data.user;
        if (data.user.username) {
          // VULNERABLE: innerHTML — stored XSS if username is a payload
          document.getElementById('navUsername').innerHTML = '@' + data.user.username;
        }
      } catch { window.location.href = '/'; }
    }

    // ── Tasks ──
    async function loadTasks() {
      const search    = document.getElementById('searchInput').value;
      const priority  = document.getElementById('priorityFilter').value;
      const completed = document.getElementById('statusFilter').value;
      const sort      = document.getElementById('sortBy').value;
      const params    = new URLSearchParams();
      if (search) params.append('search', search);
      if (priority !== 'all') params.append('priority', priority);
      if (completed) params.append('completed', completed);
      params.append('sort', sort);
      try {
        const r = await fetch(`/api/tasks?${params}`);
        tasks = await r.json();
        renderTasks();
      } catch (e) { console.error('Failed to load tasks:', e); }
    }

    function renderTasks() {
      const list  = document.getElementById('tasksList');
      const empty = document.getElementById('emptyState');
      if (!tasks.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.innerHTML = tasks.map(task => `
        <div class="task-card ${task.completed ? 'completed' : ''}" data-id="${task.id}">
          <div class="task-checkbox">
            <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
          </div>
          <div class="task-content">
            <div class="task-title">${escapeHtml(task.title)}</div>
            ${task.description ? `<p class="task-description">${escapeHtml(task.description)}</p>` : ''}
            <div class="task-meta">
              <span class="task-priority priority-${task.priority}">${task.priority}</span>
              ${task.due_date ? `<span class="task-due">Due ${formatDate(task.due_date)}</span>` : ''}
              <span class="task-date">${formatDate(task.created_at)}</span>
            </div>
          </div>
          <div class="task-actions">
            <button class="btn-icon" onclick="openComments(${task.id}, '${escapeHtml(task.title).replace(/'/g, "\\'")}')" title="Comments">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </button>
            <button class="btn-icon" onclick="editTask(${task.id})" title="Edit">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
            </button>
            <button class="btn-icon btn-danger" onclick="deleteTask(${task.id})" title="Delete">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>`).join('');
    }

    // ── Comments ──
    async function openComments(taskId, taskTitle) {
      activeTaskId = taskId;
      document.getElementById('drawerTaskTitle').textContent = taskTitle;
      document.getElementById('commentsList').innerHTML = '<div class="comments-empty">Loading…</div>';
      document.getElementById('commentsOverlay').classList.add('open');
      document.getElementById('commentsDrawer').classList.add('open');
      document.getElementById('commentInput').focus();

      try {
        const r = await fetch(`/api/tasks/${taskId}/comments`);
        const comments = await r.json();
        renderComments(comments);
      } catch { document.getElementById('commentsList').innerHTML = '<div class="comments-empty">Failed to load comments.</div>'; }
    }

    function closeComments() {
      activeTaskId = null;
      document.getElementById('commentsOverlay').classList.remove('open');
      document.getElementById('commentsDrawer').classList.remove('open');
      document.getElementById('commentInput').value = '';
    }

    function renderComments(comments) {
      const list = document.getElementById('commentsList');
      if (!comments.length) { list.innerHTML = '<div class="comments-empty">No comments yet. Be the first.</div>'; return; }
      list.innerHTML = '';
      comments.forEach(appendComment);
      list.scrollTop = list.scrollHeight;
    }

    function appendComment(comment) {
      const list = document.getElementById('commentsList');
      const empty = list.querySelector('.comments-empty');
      if (empty) empty.remove();

      const isOwn = currentUser && (comment.user_id === currentUser.id || comment.email === currentUser.email);
      const initials = (comment.username || comment.email || '?')[0].toUpperCase();
      const displayName = comment.username ? '@' + comment.username : comment.email;

      const el = document.createElement('div');
      el.className = 'comment-item';
      el.id = `comment-${comment.id}`;
      el.innerHTML = `
        <div class="comment-avatar">${initials}</div>
        <div class="comment-body">
          <div class="comment-meta">
            <span class="comment-author">${escapeHtml(displayName)}</span>
            <span class="comment-time">${timeAgo(comment.created_at)}</span>
          </div>
          <div class="comment-text">${escapeHtml(comment.content)}</div>
        </div>
        ${isOwn ? `<button class="comment-delete" onclick="deleteComment(${comment.id})" title="Delete">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>` : ''}`;
      list.appendChild(el);
      list.scrollTop = list.scrollHeight;
    }

    function checkCommentsEmpty() {
      const list = document.getElementById('commentsList');
      if (!list.querySelector('.comment-item')) {
        list.innerHTML = '<div class="comments-empty">No comments yet. Be the first.</div>';
      }
    }

    async function submitComment() {
      const input = document.getElementById('commentInput');
      const content = input.value.trim();
      if (!content || !activeTaskId) return;
      const btn = document.getElementById('commentSubmit');
      btn.disabled = true;
      try {
        await fetch(`/api/tasks/${activeTaskId}/comments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });
        input.value = '';
        input.style.height = 'auto';
      } catch (e) { console.error(e); }
      btn.disabled = false;
      input.focus();
    }

    async function deleteComment(commentId) {
      if (!activeTaskId) return;
      await fetch(`/api/tasks/${activeTaskId}/comments/${commentId}`, { method: 'DELETE' });
    }

    function handleCommentKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitComment();
      }
      // Auto-resize textarea
      e.target.style.height = 'auto';
      e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
    }

    // ── Task CRUD ──
    function showTaskModal(task = null) {
      document.getElementById('taskForm').reset();
      document.getElementById('taskId').value = '';
      if (task) {
        document.getElementById('modalTitle').textContent = 'Edit task';
        document.getElementById('taskId').value = task.id;
        document.getElementById('taskTitle').value = task.title;
        document.getElementById('taskDescription').value = task.description || '';
        document.getElementById('taskPriority').value = task.priority;
        document.getElementById('taskDueDate').value = task.due_date ? task.due_date.split('T')[0] : '';
      } else {
        document.getElementById('modalTitle').textContent = 'New task';
      }
      document.getElementById('taskModal').style.display = 'flex';
    }

    function closeTaskModal() { document.getElementById('taskModal').style.display = 'none'; }

    async function editTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) showTaskModal(task);
    }

    async function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      try {
        await fetch(`/api/tasks/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ completed: !task.completed }) });
        loadTasks();
      } catch (e) { console.error(e); }
    }

    async function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      try { await fetch(`/api/tasks/${id}`, { method: 'DELETE' }); loadTasks(); }
      catch (e) { console.error(e); }
    }

    document.getElementById('taskForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id   = document.getElementById('taskId').value;
      const data = {
        title:       document.getElementById('taskTitle').value,
        description: document.getElementById('taskDescription').value,
        priority:    document.getElementById('taskPriority').value,
        due_date:    document.getElementById('taskDueDate').value || null
      };
      try {
        if (id) {
          await fetch(`/api/tasks/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        } else {
          await fetch('/api/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        }
        closeTaskModal();
        loadTasks();
      } catch (e) { console.error(e); }
    });

    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') loadTasks(); });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });

    // ── Helpers ──
    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    function formatDate(s) {
      if (!s) return '';
      return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function timeAgo(s) {
      const diff = (Date.now() - new Date(s).getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return formatDate(s);
    }

    // ── Init ──
    checkAuth().then(() => {
      loadTasks();
      connectWS();
    });
  </script>
</body>
</html>
