<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Todoer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth">
  <div class="auth-container">
    <div class="auth-card">
      <span class="auth-logo">Todoer</span>
      <h1>New password</h1>
      <p class="subtitle" id="subtitle">Choose a strong password for your account</p>

      <form id="resetForm">
        <input type="hidden" id="token">

        <div class="form-group">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" required minlength="6" placeholder="At least 6 characters" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" required placeholder="Repeat new password" autocomplete="new-password">
        </div>

        <div id="message" class="message" style="display:none;margin-bottom:16px;"></div>

        <button type="submit" class="btn btn-primary btn-full">Reset password</button>
      </form>

      <div class="auth-footer">
        <p><a href="/">Back to sign in</a></p>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('subtitle').textContent = 'Invalid or missing reset link.';
      document.getElementById('resetForm').style.display = 'none';
    } else {
      document.getElementById('token').value = token;
      fetch(`/api/auth/verify-reset-token?token=${encodeURIComponent(token)}`)
        .then(r => r.json())
        .then(data => {
          if (!data.valid) {
            document.getElementById('subtitle').textContent = 'This reset link is invalid or has already been used.';
            document.getElementById('resetForm').style.display = 'none';
          }
        })
        .catch(() => {});
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('message');
      const btn = e.target.querySelector('button[type="submit"]');
      msg.style.display = 'none';
      msg.className = 'message';

      const np = document.getElementById('newPassword').value;
      const cp = document.getElementById('confirmPassword').value;

      if (np !== cp) {
        msg.textContent = 'Passwords do not match.';
        msg.className = 'message error';
        msg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Resetting…';

      try {
        const r = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token: document.getElementById('token').value,
            newPassword: np
          })
        });
        const data = await r.json();
        if (r.ok) {
          msg.textContent = 'Password reset successfully. Redirecting…';
          msg.className = 'message success';
          msg.style.display = 'block';
          setTimeout(() => window.location.href = '/', 2000);
        } else {
          msg.textContent = data.error || 'Something went wrong.';
          msg.className = 'message error';
          msg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Reset password';
        }
      } catch {
        msg.textContent = 'An error occurred. Please try again.';
        msg.className = 'message error';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Reset password';
      }
    });
  </script>
</body>
</html>
