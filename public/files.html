<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Files — Todoer</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface-3);
      border: 1px solid var(--border-light);
      color: var(--text-1);
      padding: 12px 18px;
      border-radius: var(--radius-md);
      font-size: 13.5px;
      box-shadow: var(--shadow-md);
      z-index: 3000;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: rgba(34,197,94,0.3); color: #22c55e; }
    .toast.error   { border-color: var(--danger-border); color: var(--danger); }

    /* ── Confirm Modal ── */
    .confirm-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 1500;
      padding: 20px;
    }
    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-lg);
      animation: modal-in 0.18s ease;
    }
    .confirm-box h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-1);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .confirm-box p {
      font-size: 13.5px;
      color: var(--text-2);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .confirm-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand" style="display:flex; align-items:center; gap:8px;">
      <object data="/assets/logo.svg" type="image/svg+xml" style="width:28px; height:28px; pointer-events:none;"></object>
      <span>Todoer</span>
    </div>
    <div class="nav-links">
      <a href="/home" class="nav-link">Tasks</a>
      <a href="/feed" class="nav-link">Feed</a>
      <a href="/files" class="nav-link active">Files</a>
      <a href="/profile" class="nav-link">Profile</a>
      <span id="navUsername" class="nav-username"></span>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg id="iconSun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="iconMoon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button id="logoutBtn" class="btn btn-secondary" style="margin-left:4px;">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>My Files</h1>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="showCreateArchiveModal()">Create archive</button>
        <label class="btn btn-primary upload-btn">
          Upload file
          <input type="file" id="fileInput" style="display:none;" onchange="uploadFile(this.files[0])">
        </label>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search files…" class="search-input">
      <button class="btn btn-secondary" onclick="loadFiles()">Search</button>
    </div>

    <div id="filesList" class="files-grid"></div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:14px;">
        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/>
      </svg>
      <p>No files yet. Upload your first one.</p>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="confirm-modal">
    <div class="confirm-box">
      <h3 id="confirmTitle"></h3>
      <p id="confirmMessage"></p>
      <div class="confirm-actions">
        <button class="btn btn-secondary" id="confirmCancel">Cancel</button>
        <button class="btn" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Image Viewer Modal -->
  <div id="imageViewerModal" class="image-viewer-modal">
    <div class="image-viewer-content">
      <div class="image-viewer-header">
        <h3 id="imageViewerTitle">Image</h3>
        <div class="image-viewer-controls">
          <button class="btn-icon" onclick="zoomIn()" title="Zoom in">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <button class="btn-icon" onclick="zoomOut()" title="Zoom out">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <button class="btn-icon" onclick="resetZoom()" title="Reset zoom">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </button>
          <button class="btn-icon" onclick="closeImageViewer()" title="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="image-viewer-body" id="imageViewerBody">
        <img id="imageViewerImg" src="" alt="Image">
      </div>
      <div class="image-viewer-footer">
        <span id="imageZoomLevel">100%</span>
        <span id="imageFileName"></span>
      </div>
    </div>
  </div>

  <!-- Create Archive Modal -->
  <div id="archiveModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create archive</h2>
        <button class="modal-close" onclick="closeArchiveModal()">×</button>
      </div>
      <form id="archiveForm">
        <div class="form-group">
          <label for="archiveName">Archive name</label>
          <input type="text" id="archiveName" placeholder="my-archive.zip">
        </div>
        <div class="form-group">
          <label>Files (<span id="selectedCount">0</span> selected)</label>
          <div id="fileCheckboxList" class="selected-files-list"></div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeArchiveModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create archive</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let files = [];
    let selectedFiles = [];
    let currentZoom = 100;
    let currentImageFile = null;

    const imageExtensions = ['jpg','jpeg','png','gif','bmp','webp','svg','ico','tiff','tif'];

    // ── Theme ──
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeIcon(saved);

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    });

    function updateThemeIcon(theme) {
      document.getElementById('iconSun').style.display  = theme === 'light' ? 'block' : 'none';
      document.getElementById('iconMoon').style.display = theme === 'dark'  ? 'block' : 'none';
    }

    // ── Toast ──
    let toastTimer;
    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast' + (type ? ' ' + type : '');
      requestAnimationFrame(() => toast.classList.add('show'));
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ── Confirm modal ──
    function showConfirm({ title, message, confirmText = 'Confirm', danger = false }) {
      return new Promise(resolve => {
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMessage').textContent = message;
        const okBtn = document.getElementById('confirmOk');
        okBtn.textContent = confirmText;
        okBtn.className = 'btn ' + (danger ? 'btn-danger' : 'btn-primary');
        document.getElementById('confirmModal').style.display = 'flex';

        const cleanup = (result) => {
          document.getElementById('confirmModal').style.display = 'none';
          okBtn.removeEventListener('click', onOk);
          document.getElementById('confirmCancel').removeEventListener('click', onCancel);
          resolve(result);
        };
        const onOk     = () => cleanup(true);
        const onCancel = () => cleanup(false);
        okBtn.addEventListener('click', onOk);
        document.getElementById('confirmCancel').addEventListener('click', onCancel);
      });
    }

    // ── Auth ──
    async function checkAuth() {
      try {
        const r = await fetch('/api/auth/me');
        if (!r.ok) { window.location.href = '/'; return; }
        const data = await r.json();
        if (data.user.username) {
          // VULNERABLE: innerHTML — XSS vector
          document.getElementById('navUsername').innerHTML = '@' + data.user.username;
        }
      } catch { window.location.href = '/'; }
    }

    // ── Files ──
    async function loadFiles() {
      const search = document.getElementById('searchInput').value;
      const params = new URLSearchParams();
      if (search) params.append('search', search);
      try {
        const response = await fetch(`/api/files?${params.toString()}`);
        files = await response.json();
        renderFiles();
      } catch (error) { console.error('Failed to load files:', error); }
    }

    function isImageFile(filename) {
      return imageExtensions.includes(filename.split('.').pop().toLowerCase());
    }

    function renderFiles() {
      const filesList  = document.getElementById('filesList');
      const emptyState = document.getElementById('emptyState');
      if (files.length === 0) { filesList.innerHTML = ''; emptyState.style.display = 'block'; return; }
      emptyState.style.display = 'none';
      filesList.innerHTML = files.map(file => `
        <div class="file-card ${file.extracted_from ? 'extracted-file' : ''}" data-id="${file.id}">
          <div class="file-icon">${getFileIcon(file.original_name)}</div>
          <div class="file-info">
            <h3 class="file-name" title="${escapeHtml(file.original_name)}">${escapeHtml(file.original_name)}</h3>
            <p class="file-size">${formatFileSize(file.size)}</p>
            <p class="file-date">${formatDate(file.created_at)}</p>
            ${file.extracted_from ? `<p class="file-source">From: ${escapeHtml(file.extracted_from)}</p>` : ''}
          </div>
          <div class="file-actions">
            ${isImageFile(file.original_name) ? `
              <button class="btn-icon" onclick="viewImage(${file.id})" title="View">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>` : ''}
            <button class="btn-icon" onclick="downloadFile(${file.id})" title="Download">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            ${isArchive(file.original_name) && !file.extracted_from ? `
              <button class="btn-icon" onclick="extractArchive(${file.id}, '${escapeHtml(file.original_name)}')" title="Extract">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>
              </button>` : ''}
            <button class="btn-icon btn-danger" onclick="deleteFile(${file.id}, '${escapeHtml(file.original_name)}')" title="Delete">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>`).join('');
    }

    // ── Image viewer ──
    function viewImage(fileId) {
      const file = files.find(f => f.id === fileId);
      if (!file) return;
      currentImageFile = file;
      currentZoom = 100;
      document.getElementById('imageViewerTitle').textContent = file.original_name;
      document.getElementById('imageFileName').textContent = formatFileSize(file.size);
      const img = document.getElementById('imageViewerImg');
      img.src = `/api/files/${fileId}/download?t=${Date.now()}`;
      img.style.transform = `scale(1)`;
      document.getElementById('imageZoomLevel').textContent = '100%';
      document.getElementById('imageViewerModal').style.display = 'flex';
    }

    function closeImageViewer() {
      document.getElementById('imageViewerModal').style.display = 'none';
      document.getElementById('imageViewerImg').src = '';
      currentImageFile = null; currentZoom = 100;
    }

    function zoomIn()    { if (currentZoom < 300) { currentZoom += 25; updateZoom(); } }
    function zoomOut()   { if (currentZoom > 25)  { currentZoom -= 25; updateZoom(); } }
    function resetZoom() { currentZoom = 100; updateZoom(); }

    function updateZoom() {
      document.getElementById('imageViewerImg').style.transform = `scale(${currentZoom / 100})`;
      document.getElementById('imageZoomLevel').textContent = `${currentZoom}%`;
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeImageViewer();
        closeArchiveModal();
        document.getElementById('confirmModal').style.display = 'none';
      }
    });

    document.getElementById('imageViewerModal').addEventListener('click', e => {
      if (e.target.id === 'imageViewerModal') closeImageViewer();
    });

    // ── File actions ──
    function getFileIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const color = {
        pdf:  ['#ef4444','#dc2626'], zip:  ['#f59e0b','#d97706'],
        tar:  ['#f59e0b','#d97706'], gz:   ['#f59e0b','#d97706'],
        txt:  ['#60a5fa','#3b82f6'], js:   ['#fbbf24','#f59e0b'],
        jpg:  ['#a78bfa','#8b5cf6'], jpeg: ['#a78bfa','#8b5cf6'],
        png:  ['#a78bfa','#8b5cf6'], gif:  ['#a78bfa','#8b5cf6'],
        webp: ['#a78bfa','#8b5cf6'], svg:  ['#a78bfa','#8b5cf6'],
      };
      const isImage = imageExtensions.includes(ext);
      const isArc   = ['zip','tar','gz','rar','7z'].includes(ext);
      const c       = color[ext] || ['#6b7280','#4b5563'];

      if (isImage) return `<svg width="44" height="44" viewBox="0 0 24 24" fill="${c[0]}22" stroke="${c[0]}" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
      if (isArc)   return `<svg width="44" height="44" viewBox="0 0 24 24" fill="${c[0]}22" stroke="${c[0]}" stroke-width="1.2"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>`;
      return `<svg width="44" height="44" viewBox="0 0 24 24" fill="${c[0]}22" stroke="${c[0]}" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
    }

    function isArchive(filename) {
      return ['zip','rar','7z','tar','gz'].includes(filename.split('.').pop().toLowerCase());
    }

    async function uploadFile(file) {
      if (!file) return;
      const formData = new FormData();
      formData.append('file', file);
      try {
        const response = await fetch('/api/files/upload', { method: 'POST', body: formData });
        if (response.ok) { loadFiles(); showToast('File uploaded.', 'success'); }
        else { showToast('Failed to upload file.', 'error'); }
      } catch { showToast('Upload failed.', 'error'); }
      document.getElementById('fileInput').value = '';
    }

    async function downloadFile(id) { window.location.href = `/api/files/${id}/download`; }

    async function extractArchive(id, name) {
      const confirmed = await showConfirm({
        title: 'Extract archive',
        message: `Extract "${name}"? Files will be added to your file list.`,
        confirmText: 'Extract'
      });
      if (!confirmed) return;
      try {
        const response = await fetch(`/api/files/extract/${id}`, { method: 'POST' });
        const data = await response.json();
        if (response.ok) { loadFiles(); showToast(`Extracted ${data.files.length} file(s).`, 'success'); }
        else { showToast(data.error || 'Extraction failed.', 'error'); }
      } catch { showToast('Extraction failed.', 'error'); }
    }

    async function deleteFile(id, name) {
      const confirmed = await showConfirm({
        title: 'Delete file',
        message: `"${name}" will be permanently deleted.`,
        confirmText: 'Delete',
        danger: true
      });
      if (!confirmed) return;
      try {
        await fetch(`/api/files/${id}`, { method: 'DELETE' });
        loadFiles();
        showToast('File deleted.', 'success');
      } catch { showToast('Failed to delete file.', 'error'); }
    }

    // ── Create archive ──
    function showCreateArchiveModal() {
      selectedFiles = [];
      renderFileCheckboxes();
      document.getElementById('archiveModal').style.display = 'flex';
    }

    function closeArchiveModal() { document.getElementById('archiveModal').style.display = 'none'; }

    function renderFileCheckboxes() {
      const list = document.getElementById('fileCheckboxList');
      document.getElementById('selectedCount').textContent = selectedFiles.length;
      if (!files.length) {
        list.innerHTML = '<p style="color:var(--text-3);font-size:13px;padding:8px 0;">No files available.</p>';
        return;
      }
      list.innerHTML = files.map(f => `
        <div class="selected-file-item" style="cursor:pointer;" onclick="toggleFileSelection(${f.id})">
          <span>${escapeHtml(f.original_name)}</span>
          <input type="checkbox" ${selectedFiles.includes(f.id) ? 'checked' : ''} style="pointer-events:none;accent-color:var(--accent);flex-shrink:0;">
        </div>`).join('');
    }

    function toggleFileSelection(id) {
      const index = selectedFiles.indexOf(id);
      if (index === -1) { selectedFiles.push(id); } else { selectedFiles.splice(index, 1); }
      renderFileCheckboxes();
    }

    document.getElementById('archiveForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (selectedFiles.length === 0) { showToast('Select at least one file.', 'error'); return; }
      try {
        const response = await fetch('/api/files/create-archive', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fileIds: selectedFiles,
            archiveName: document.getElementById('archiveName').value || `archive-${Date.now()}.zip`
          })
        });
        if (response.ok) { closeArchiveModal(); loadFiles(); showToast('Archive created.', 'success'); }
        else { showToast('Failed to create archive.', 'error'); }
      } catch { showToast('Failed to create archive.', 'error'); }
    });

    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') loadFiles(); });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });

    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    function formatFileSize(bytes) {
      if (!bytes) return '0 B';
      const k = 1024, sizes = ['B','KB','MB','GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    checkAuth();
    loadFiles();
  </script>
</body>
</html>
