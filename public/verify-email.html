<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — Todoer</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .code-inputs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      width: 100%;
    }

    .code-input {
      flex: 1;
      min-width: 0;
      aspect-ratio: 1;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0;
      padding: 0 !important;
      border-radius: 8px !important;
      border: 1px solid #d1d5db !important;
      color: #0a0a0a !important;
      background: #ffffff !important;
      caret-color: #0a0a0a;
      transition: border-color 0.15s;
      width: 100% !important;
    }

    .code-input:focus {
      border-color: #0a0a0a !important;
      outline: none;
    }

    .code-input.filled {
      border-color: #0a0a0a !important;
    }

    .resend-row {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #6b6b6b;
    }

    .resend-row button {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: #0a0a0a;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    .resend-row button:disabled {
      color: #9ca3af;
      cursor: not-allowed;
      text-decoration: none;
    }
  </style>
</head>
<body class="auth">
  <div class="auth-container">
    <div class="auth-card">
      <span class="auth-logo">Todoer</span>
      <h1>Check your email</h1>
      <p class="subtitle" id="subtitle">We sent a 6-digit code to <strong id="emailDisplay"></strong></p>

      <form id="verifyForm">
        <div class="code-inputs">
          <input class="code-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
          <input class="code-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input class="code-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input class="code-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input class="code-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input class="code-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        </div>

        <div id="message" class="message" style="display:none;"></div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Verify email</button>
      </form>

      <div class="resend-row">
        <span>Didn't get it? </span>
        <button id="resendBtn">Resend code</button>
      </div>

      <div class="auth-footer" style="margin-top:16px;">
        <p><a href="/register">Use a different email</a></p>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email  = params.get('email');

    if (!email) {
      window.location.href = '/register';
    } else {
      document.getElementById('emailDisplay').textContent = email;
    }

    // Code input behaviour — auto-advance, backspace, paste
    const inputs = Array.from(document.querySelectorAll('.code-input'));

    inputs.forEach((input, i) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val ? val[0] : '';
        if (val && i < inputs.length - 1) inputs[i + 1].focus();
        updateFilled();
        if (getCode().length === 6) document.getElementById('verifyForm').requestSubmit();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && i > 0) {
          inputs[i - 1].focus();
          inputs[i - 1].value = '';
          updateFilled();
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
        pasted.split('').forEach((char, j) => {
          if (inputs[j]) inputs[j].value = char;
        });
        updateFilled();
        const nextEmpty = inputs.find(inp => !inp.value);
        if (nextEmpty) nextEmpty.focus();
        else inputs[inputs.length - 1].focus();
        if (getCode().length === 6) document.getElementById('verifyForm').requestSubmit();
      });
    });

    function getCode() { return inputs.map(i => i.value).join(''); }
    function updateFilled() { inputs.forEach(i => i.classList.toggle('filled', !!i.value)); }
    function clearCode() { inputs.forEach(i => { i.value = ''; i.classList.remove('filled'); }); inputs[0].focus(); }

    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = getCode();
      if (code.length < 6) return;

      const msg = document.getElementById('message');
      const btn = document.getElementById('submitBtn');
      msg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Verifying…';

      try {
        const r = await fetch('/api/auth/verify-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code })
        });
        const data = await r.json();
        if (r.ok) {
          msg.textContent = 'Email verified. Redirecting…';
          msg.className = 'message success';
          msg.style.display = 'block';
          setTimeout(() => window.location.href = '/home', 1200);
        } else {
          msg.textContent = data.error || 'Invalid code. Try again.';
          msg.className = 'message error';
          msg.style.display = 'block';
          clearCode();
          btn.disabled = false;
          btn.textContent = 'Verify email';
        }
      } catch {
        msg.textContent = 'An error occurred. Please try again.';
        msg.className = 'message error';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Verify email';
      }
    });

    // Resend
    let resendCooldown = 0;
    const resendBtn = document.getElementById('resendBtn');

    function startCooldown(seconds) {
      resendCooldown = seconds;
      resendBtn.disabled = true;
      const tick = setInterval(() => {
        resendCooldown--;
        resendBtn.textContent = `Resend in ${resendCooldown}s`;
        if (resendCooldown <= 0) {
          clearInterval(tick);
          resendBtn.disabled = false;
          resendBtn.textContent = 'Resend code';
        }
      }, 1000);
    }

    resendBtn.addEventListener('click', async () => {
      const msg = document.getElementById('message');
      msg.style.display = 'none';
      try {
        const r = await fetch('/api/auth/resend-verification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await r.json();
        if (r.ok) {
          msg.textContent = 'New code sent.';
          msg.className = 'message success';
          clearCode();
        } else {
          msg.textContent = data.error || 'Failed to resend code.';
          msg.className = 'message error';
        }
        msg.style.display = 'block';
        startCooldown(30);
      } catch {
        msg.textContent = 'An error occurred.';
        msg.className = 'message error';
        msg.style.display = 'block';
      }
    });

    inputs[0].focus();
  </script>
</body>
</html>
