<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Todoer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth">

  <!-- Animated background canvas -->
  <canvas id="bgCanvas"></canvas>

  <div class="auth-container">
    <div class="auth-card">
      <span class="auth-logo">Todoer</span>
      <h1>Reset password</h1>
      <p class="subtitle">Enter your email and we'll send you a reset link</p>

      <form id="forgotForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
        </div>

        <div id="message" class="message" style="display:none;margin-bottom:16px;"></div>

        <button type="submit" class="btn btn-primary btn-full">Send reset link</button>
      </form>

      <div class="auth-footer">
        <p>Remember it? <a href="/">Sign in</a></p>
      </div>
    </div>
  </div>

  <script>
    /* ── Particle / orb background ── */
    (function () {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const orbs = Array.from({ length: 6 }, (_, i) => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: 180 + Math.random() * 160,
        dx: (Math.random() - 0.5) * 0.35,
        dy: (Math.random() - 0.5) * 0.35,
        hue: [220, 240, 260, 200, 250, 230][i],
        alpha: 0.07 + Math.random() * 0.06,
      }));

      const particles = Array.from({ length: 55 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: 0.8 + Math.random() * 1.4,
        dx: (Math.random() - 0.5) * 0.18,
        dy: -0.12 - Math.random() * 0.18,
        alpha: 0.15 + Math.random() * 0.25,
      }));

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        orbs.forEach(o => {
          o.x += o.dx; o.y += o.dy;
          if (o.x < -o.r) o.x = canvas.width + o.r;
          if (o.x > canvas.width + o.r) o.x = -o.r;
          if (o.y < -o.r) o.y = canvas.height + o.r;
          if (o.y > canvas.height + o.r) o.y = -o.r;

          const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
          g.addColorStop(0, `hsla(${o.hue},70%,65%,${o.alpha})`);
          g.addColorStop(1, `hsla(${o.hue},70%,65%,0)`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
          ctx.fill();
        });

        particles.forEach(p => {
          p.x += p.dx; p.y += p.dy;
          if (p.y < -4) { p.y = canvas.height + 4; p.x = Math.random() * canvas.width; }
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
          ctx.fill();
        });

        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ── Form submit ── */
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('message');
      const btn = e.target.querySelector('button[type="submit"]');
      msg.style.display = 'none';
      msg.className = 'message';
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const r = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value })
        });
        const data = await r.json();
        if (r.ok) {
          msg.textContent = data.message;
          msg.className = 'message success';
          document.getElementById('forgotForm').reset();
        } else {
          msg.textContent = data.error || 'Something went wrong.';
          msg.className = 'message error';
        }
      } catch {
        msg.textContent = 'An error occurred. Please try again.';
        msg.className = 'message error';
      }
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Send reset link';
    });
  </script>
</body>
</html>
