<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Todoer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth">
  <div class="auth-container">
    <div class="auth-card">
      <a href="/" class="auth-logo" aria-label="Todoer home" style="display: flex; justify-content: center; margin-bottom: 28px; text-decoration: none;">
        <span style="display: inline-flex; align-items: center; justify-content: center; padding: 14px 18px; background: linear-gradient(180deg, #ffffff 0%, #f8f8f8 100%); border: 1px solid #e5e5e5; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
          <img src="/assets/logo.svg" alt="Todoer" class="auth-logo-image" style="width: 132px; height: auto; display: block;">
        </span>
      </a>
      <h1>Sign in</h1>
      <p class="subtitle">Enter your credentials to access your account</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="form-group">
          <div class="label-row">
            <label for="password">Password</label>
            <a href="/forgot-password">Forgot password?</a>
          </div>
          <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
        </div>

        <div id="errorMessage" class="error-message" style="display:none;margin-bottom:16px;"></div>

        <button type="submit" class="btn btn-primary btn-full">Sign in</button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="/register">Create one</a></p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');
      const btn = e.target.querySelector('button[type="submit"]');
      errorMessage.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (!response.ok) {
          if (data.unverified) {
            window.location.href = '/verify-email?email=' + encodeURIComponent(data.email);
            return;
          }
          errorMessage.textContent = data.error || 'Login failed';
          errorMessage.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign in';
          return;
        }
        window.location.href = '/home';
      } catch {
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
