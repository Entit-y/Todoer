<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Todoer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth">
  <div class="auth-container">
    <div class="auth-card">
      <span class="auth-logo">Todoer</span>
      <h1>Create account</h1>
      <p class="subtitle">Start managing your tasks today</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="username">Username <span class="optional-tag">(optional)</span></label>
          <input type="text" id="username" name="username" placeholder="johndoe" autocomplete="username">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repeat your password" autocomplete="new-password">
        </div>

        <div id="errorMessage" class="error-message" style="display:none;margin-bottom:16px;"></div>

        <button type="submit" class="btn btn-primary btn-full">Create account</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="/">Sign in</a></p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMessage = document.getElementById('errorMessage');
      const btn = e.target.querySelector('button[type="submit"]');
      errorMessage.style.display = 'none';
      if (password !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match';
        errorMessage.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, username: username || undefined })
        });
        const data = await response.json();
        if (!response.ok) {
          errorMessage.textContent = data.error || 'Registration failed';
          errorMessage.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Create account';
          return;
        }
        window.location.href = '/verify-email?email=' + encodeURIComponent(data.email);
      } catch {
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
