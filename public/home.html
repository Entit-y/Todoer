<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — Todoer</title>
  <link rel="stylesheet" href="/styles.css">
  <!-- Lodash 4.17.20 — task filtering, sorting, and group rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.20/lodash.min.js" crossorigin="anonymous"></script>
  <style>
    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface-3); border: 1px solid var(--border-light);
      color: var(--text-1); padding: 12px 18px;
      border-radius: var(--radius-md); font-size: 13.5px;
      box-shadow: var(--shadow-md); z-index: 3000;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: rgba(34,197,94,0.3); color: #22c55e; }
    .toast.error   { border-color: var(--danger-border); color: var(--danger); }

    /* ── Confirm modal ── */
    .confirm-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      justify-content: center; align-items: center;
      z-index: 1500; padding: 20px;
    }
    .confirm-box {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: var(--radius-lg); padding: 28px;
      width: 100%; max-width: 380px;
      box-shadow: var(--shadow-lg); animation: modal-in 0.18s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .confirm-box h3 { font-size: 15px; font-weight: 600; color: var(--text-1); margin-bottom: 8px; letter-spacing: -0.02em; }
    .confirm-box p  { font-size: 13.5px; color: var(--text-2); margin-bottom: 24px; line-height: 1.5; }
    .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── Page header extras ── */
    .task-count-badge {
      font-size: 12px; font-weight: 600; color: var(--text-3);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 9px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Filters bar ── */
    .filters-bar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .search-box {
      flex: 1; min-width: 180px; position: relative;
    }
    .search-box .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 7px 12px 7px 32px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-1);
      font-family: var(--font); font-size: 13px; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input:focus { border-color: var(--border-light); box-shadow: 0 0 0 3px var(--accent-dim); }
    .search-input::placeholder { color: var(--text-3); }

    .filter-divider {
      width: 1px; height: 20px; background: var(--border); flex-shrink: 0;
    }
    .filter-group { display: flex; gap: 6px; }

    /* ── Task list ── */
    .tasks-list { display: flex; flex-direction: column; gap: 2px; }

    .task-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 16px 16px 16px 20px;
      display: flex; align-items: flex-start; gap: 12px;
      transition: border-color 0.12s, background 0.12s, box-shadow 0.12s;
      position: relative; overflow: hidden;
      cursor: default;
    }
    .task-card::before {
      content: ''; position: absolute;
      left: 0; top: 10px; bottom: 10px;
      width: 3px; border-radius: 0 3px 3px 0;
      background: var(--border);
      transition: opacity 0.12s;
    }
    .task-card:has(.priority-high)::before   { background: rgba(239,68,68,0.7); }
    .task-card:has(.priority-medium)::before { background: rgba(234,179,8,0.6); }
    .task-card:has(.priority-low)::before    { background: rgba(34,197,94,0.6); }

    .task-card:hover { border-color: var(--border-light); background: var(--surface-2); box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
    .task-card:hover .task-actions { opacity: 1; transform: translateX(0); }
    /* Subtle "this row is interactive" cue — a faint right-edge accent on hover */
    .task-card:hover::after {
      content: ''; position: absolute;
      right: 0; top: 0; bottom: 0; width: 2px;
      background: var(--border-light); border-radius: 0;
      opacity: 0.5;
    }

    .task-card.completed { opacity: 0.72; }
    .task-card.completed .task-title { text-decoration: line-through; color: var(--text-3); }

    /* ── Checkbox ── */
    .task-checkbox { padding-top: 1px; flex-shrink: 0; }
    .task-checkbox input[type="checkbox"] {
      width: 15px; height: 15px; cursor: pointer;
      accent-color: var(--accent); flex-shrink: 0;
    }

    /* ── Content ── */
    .task-content { flex: 1; min-width: 0; }
    .task-title {
      font-size: 14.5px; font-weight: 600; color: var(--text-1);
      margin-bottom: 5px; letter-spacing: -0.02em; line-height: 1.35;
    }
    .task-description {
      color: var(--text-3); font-size: 12px; margin-bottom: 9px; line-height: 1.55;
      font-weight: 400;
    }
    .task-meta {
      display: flex; gap: 6px; flex-wrap: wrap;
      align-items: center; font-size: 11px; color: var(--text-3);
    }
    .task-priority {
      padding: 1px 6px; border-radius: 4px;
      font-weight: 600; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .task-due { color: var(--text-3); }
    .task-due.overdue {
      color: #ef4444; font-weight: 600;
      display: inline-flex; align-items: center; gap: 3px;
    }
    .task-due.overdue::before {
      content: ''; display: inline-block;
      width: 5px; height: 5px; border-radius: 50%;
      background: #ef4444; flex-shrink: 0;
    }
    .task-date { color: var(--text-3); }
    .task-sep { color: var(--border-light); }

    /* ── Actions — subtle at rest, visible on hover ── */
    .task-actions {
      display: flex; gap: 2px; flex-shrink: 0;
      opacity: 0.25; transition: opacity 0.15s, transform 0.15s;
      padding-top: 1px;
      transform: translateX(4px);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 72px 20px 60px;
      color: var(--text-3);
    }
    .empty-state-icon {
      width: 52px; height: 52px; margin: 0 auto 18px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;
    }
    .empty-state-icon svg { opacity: 0.45; }
    .empty-state p { font-size: 14px; color: var(--text-2); margin-bottom: 6px; font-weight: 600; letter-spacing: -0.02em; }
    .empty-state span { font-size: 12.5px; color: var(--text-3); display: block; margin-bottom: 20px; }

    /* ── Comments drawer ── */
    .comments-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 900;
    }
    .comments-overlay.open { display: block; }

    .comments-drawer {
      position: fixed; top: 0; right: -440px;
      width: 440px; max-width: 100vw; height: 100vh;
      background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 1000; transition: right 0.25s cubic-bezier(0.22,1,0.36,1);
      box-shadow: var(--shadow-lg);
    }
    .comments-drawer.open { right: 0; }

    .drawer-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .drawer-header h3 { font-size: 13.5px; font-weight: 600; color: var(--text-1); letter-spacing: -0.02em; }
    .drawer-task-title {
      font-size: 11.5px; color: var(--text-3); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px;
    }

    .drawer-close {
      width: 28px; height: 28px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-3); transition: color 0.15s, border-color 0.15s; flex-shrink: 0;
    }
    .drawer-close:hover { color: var(--text-1); border-color: var(--border-light); }

    .comments-list {
      flex: 1; overflow-y: auto; padding: 14px 20px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .comment-item { display: flex; gap: 10px; animation: fadeIn 0.15s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar color classes reused from feed */
    .av-0 { background: rgba(99,102,241,0.18);  color: #818cf8; }
    .av-1 { background: rgba(236,72,153,0.15);  color: #f472b6; }
    .av-2 { background: rgba(20,184,166,0.15);  color: #2dd4bf; }
    .av-3 { background: rgba(245,158,11,0.15);  color: #fbbf24; }
    .av-4 { background: rgba(239,68,68,0.12);   color: #f87171; }
    .av-5 { background: rgba(34,197,94,0.12);   color: #4ade80; }
    .av-6 { background: rgba(249,115,22,0.15);  color: #fb923c; }
    .av-7 { background: rgba(168,85,247,0.15);  color: #c084fc; }

    .comment-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10.5px; font-weight: 700;
      flex-shrink: 0; margin-top: 1px; letter-spacing: -0.01em;
    }

    .comment-body { flex: 1; min-width: 0; }
    .comment-meta { display: flex; align-items: baseline; gap: 6px; margin-bottom: 3px; }
    .comment-author { font-size: 12.5px; font-weight: 600; color: var(--text-1); }
    .comment-time { font-size: 11px; color: var(--text-3); margin-left: auto; }
    .comment-text { font-size: 13px; color: var(--text-2); line-height: 1.55; word-break: break-word; }

    .comment-delete {
      background: none; border: none; color: var(--text-3);
      cursor: pointer; padding: 2px; border-radius: 3px;
      opacity: 0; transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0; margin-top: 2px;
    }
    .comment-item:hover .comment-delete { opacity: 1; }
    .comment-delete:hover { color: var(--danger); }

    .comments-empty {
      text-align: center; padding: 48px 20px 32px; color: var(--text-3);
    }
    .comments-empty-icon {
      width: 40px; height: 40px; margin: 0 auto 12px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;
      color: var(--text-3);
    }

    .comment-input-area { padding: 14px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .comment-input-row { display: flex; gap: 8px; align-items: flex-end; }

    .comment-input {
      flex: 1; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 9px 12px;
      color: var(--text-1); font-family: var(--font); font-size: 13.5px;
      resize: none; outline: none; line-height: 1.5;
      max-height: 120px; min-height: 38px; transition: border-color 0.15s;
    }
    .comment-input:focus { border-color: var(--border-light); }
    .comment-input::placeholder { color: var(--text-3); }

    .comment-submit {
      background: var(--accent); border: none; border-radius: var(--radius-sm);
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--accent-text); transition: background 0.15s; flex-shrink: 0;
    }
    .comment-submit:hover { background: var(--accent-hover); }
    .comment-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Loading skeleton ── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 4px;
    }
    .skeleton-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 16px 16px 16px 20px;
      display: flex; gap: 12px; align-items: flex-start;
      position: relative; overflow: hidden;
    }
    .skeleton-card::before {
      content: ''; position: absolute;
      left: 0; top: 10px; bottom: 10px; width: 3px;
      border-radius: 0 3px 3px 0; background: var(--border);
    }
    .skeleton-check { width: 15px; height: 15px; border-radius: 3px; flex-shrink: 0; margin-top: 2px; }
    .skeleton-body { flex: 1; display: flex; flex-direction: column; gap: 7px; }
    .skeleton-title { height: 14px; width: 55%; }
    .skeleton-desc  { height: 11px; width: 80%; }
    .skeleton-meta  { height: 10px; width: 30%; }

    /* ── Comment count badge on action button ── */
    .btn-icon-wrap { position: relative; display: inline-flex; }
    .comment-count-dot {
      position: absolute; top: -3px; right: -3px;
      min-width: 14px; height: 14px; padding: 0 3px;
      background: var(--accent); color: var(--accent-text);
      border-radius: 7px; font-size: 9px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      line-height: 1; font-variant-numeric: tabular-nums;
      pointer-events: none;
    }

    /* ── Due today amber treatment ── */
    .task-due.due-today { color: #f59e0b; font-weight: 600; }
    .task-due.due-today::before {
      content: ''; display: inline-block;
      width: 5px; height: 5px; border-radius: 50%;
      background: #f59e0b; flex-shrink: 0; margin-right: 3px;
    }

    /* ── Keyboard shortcut hint ── */
    .kbd-hint {
      font-size: 10.5px; color: var(--text-3);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px;
      font-family: var(--font); letter-spacing: 0;
      display: inline-block; line-height: 1.6;
    }

    /* ── Drawer comment count ── */
    .drawer-comment-count {
      font-size: 11px; font-weight: 600; color: var(--text-3);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1px 7px;
      font-variant-numeric: tabular-nums;
    }
    .drawer-header-left { display: flex; align-items: center; gap: 8px; }

    .modal-content input:focus,
    .modal-content textarea:focus,
    .modal-content select:focus {
      border-color: var(--border-light);
      box-shadow: 0 0 0 3px var(--accent-dim);
      outline: none;
    }

    /* ── Group headers (grouped_priority sort) ── */
    .group-header {
      display: flex; align-items: center; gap: 8px;
      padding: 18px 4px 8px; user-select: none;
    }
    .group-header:first-child { padding-top: 4px; }
    .group-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; padding: 2px 8px; border-radius: 4px;
    }
    .group-count {
      font-size: 11.5px; color: var(--text-3); font-weight: 500;
    }
  </style>
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <object data="/assets/logo.svg" type="image/svg+xml" style="width:24px;height:24px;pointer-events:none;flex-shrink:0;"></object>
      <span class="sidebar-brand-text">Todoer</span>
    </div>

    <nav class="sidebar-nav">
      <a href="/home" class="nav-link active">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/>
        </svg>
        Tasks
      </a>
      <a href="/feed" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Feed
      </a>
      <a href="/files" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/>
        </svg>
        Files
      </a>
      <a href="/workspaces" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Workspaces
      </a>
      <a href="/profile" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Profile
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sidebarAvatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebarName">—</div>
          <div class="sidebar-user-email" id="sidebarEmail">—</div>
        </div>
      </div>
      <div class="sidebar-footer-actions">
        <button class="sidebar-logout" id="logoutBtn">Sign out</button>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
          <svg id="iconSun" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="iconMoon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <main class="container">
      <div class="page-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <h1>My Tasks</h1>
          <span class="task-count-badge" id="taskCountBadge">—</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="btn btn-primary" onclick="showTaskModal()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New task
          </button>
          <span class="kbd-hint" title="Press N to create a new task">N</span>
        </div>
      </div>

      <div class="filters-bar">
        <div class="search-box">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Search tasks…" class="search-input" oninput="debouncedLoad()">
        </div>
        <div class="filter-divider"></div>
        <div class="filter-group">
          <select id="priorityFilter" class="filter-select" onchange="applyFilters()">
            <option value="all">All priorities</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <select id="statusFilter" class="filter-select" onchange="applyFilters()">
            <option value="">All status</option>
            <option value="false">Pending</option>
            <option value="true">Completed</option>
          </select>
          <select id="sortBy" class="filter-select" onchange="applyFilters()">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="priority">By priority</option>
            <option value="due_date">By due date</option>
            <option value="grouped_priority">Group by priority</option>
          </select>
        </div>
      </div>

      <div id="tasksList" class="tasks-list"></div>

      <div id="emptyState" class="empty-state" style="display:none;">
        <div class="empty-state-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/>
          </svg>
        </div>
        <p>No tasks here</p>
        <span>Create your first task to get started.</span>
        <button class="btn btn-primary" onclick="showTaskModal()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New task
        </button>
      </div>
    </main>
  </div>

</div>

  <!-- Task Modal -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">New task</h2>
        <button class="modal-close" onclick="closeTaskModal()" title="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <div class="form-group">
          <label for="taskTitle">Title</label>
          <input type="text" id="taskTitle" required placeholder="What needs to be done?">
        </div>
        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" rows="3" placeholder="Add details…"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority" class="form-select">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskDueDate">Due date</label>
            <input type="date" id="taskDueDate">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Comments drawer -->
  <div class="comments-overlay" id="commentsOverlay" onclick="closeComments()"></div>
  <div class="comments-drawer" id="commentsDrawer">
    <div class="drawer-header">
      <div>
        <div class="drawer-header-left">
          <h3>Comments</h3>
          <span class="drawer-comment-count" id="drawerCommentCount" style="display:none"></span>
        </div>
        <div class="drawer-task-title" id="drawerTaskTitle"></div>
      </div>
      <button class="drawer-close" onclick="closeComments()" title="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="comments-list" id="commentsList"></div>
    <div class="comment-input-area">
      <div class="comment-input-row">
        <textarea class="comment-input" id="commentInput" placeholder="Add a comment…" rows="1"
          onkeydown="handleCommentKey(event)"></textarea>
        <button class="comment-submit" id="commentSubmit" onclick="submitComment()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="confirm-modal">
    <div class="confirm-box">
      <h3 id="confirmTitle"></h3>
      <p id="confirmMessage"></p>
      <div class="confirm-actions">
        <button class="btn btn-secondary" id="confirmCancel">Cancel</button>
        <button class="btn" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    let tasks = [];
    let allTasks = [];   // full unfiltered set from server; filtering happens client-side via Lodash
    let currentUser = null;
    let activeTaskId = null;
    let ws = null;
    let wsActive = true;  // set false on logout to stop reconnect

    // ── Theme ──
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeIcon(saved);

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    });

    function updateThemeIcon(theme) {
      document.getElementById('iconSun').style.display  = theme === 'light' ? 'block' : 'none';
      document.getElementById('iconMoon').style.display = theme === 'dark'  ? 'block' : 'none';
    }

    // Avatar colors
    const AV_COLORS = ['#6366f1','#8b5cf6','#ec4899','#ef4444','#f59e0b','#10b981','#06b6d4','#3b82f6'];
    function avatarColor(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
      return AV_COLORS[h % AV_COLORS.length];
    }

    // ── WebSocket ──
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'task_comment:new' && data.taskId === activeTaskId) {
          appendComment(data.comment);
          updateDrawerCommentCount(1);
        }
        if (data.type === 'task_comment:delete' && data.taskId === activeTaskId) {
          document.getElementById(`comment-${data.commentId}`)?.remove();
          checkCommentsEmpty();
          updateDrawerCommentCount(-1);
        }
      };
      ws.onclose = () => { if (wsActive) setTimeout(connectWS, 3000); };
      ws.onerror = () => ws.close();
    }

    // ── Auth ──
    async function checkAuth() {
      try {
        const r = await fetch('/api/auth/me');
        if (!r.ok) { window.location.href = '/'; return; }
        const data = await r.json();
        currentUser = data.user;
        const key = data.user.username || data.user.email || '?';
        const initial = key[0].toUpperCase();
        const sidebarAv = document.getElementById('sidebarAvatar');
        sidebarAv.textContent = initial;
        sidebarAv.style.background = avatarColor(key);
        sidebarAv.style.border = 'none';
        document.getElementById('sidebarEmail').textContent = data.user.email;
        // VULNERABLE: innerHTML — stored XSS if username is a payload
        if (data.user.username) {
          document.getElementById('sidebarName').innerHTML = '@' + data.user.username;
        } else {
          document.getElementById('sidebarName').textContent = data.user.email;
        }
      } catch { window.location.href = '/'; }
    }

    // ── Debounced search ──
    let searchTimer = null;
    function debouncedLoad() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(applyFilters, 300);
    }

    // ── Tasks ──
    async function loadTasks() {
      // Fetch the full task set once; filtering and sorting happen client-side via Lodash
      showSkeleton();
      try {
        const r = await fetch('/api/tasks');
        allTasks = await r.json();
        applyFilters();
      } catch (e) {
        console.error('Failed to load tasks:', e);
        document.getElementById('tasksList').innerHTML = '';
        showToast('Failed to load tasks.', 'error');
      }
    }

    // ── Client-side filter + sort via Lodash ──
    function applyFilters() {
      const search    = document.getElementById('searchInput').value.toLowerCase();
      const priority  = document.getElementById('priorityFilter').value;
      const completed = document.getElementById('statusFilter').value;
      const sort      = document.getElementById('sortBy').value;

      const PRIORITY_RANK = { high: 0, medium: 1, low: 2 };

      // _.filter — replace hand-rolled multi-condition filtering
      const filtered = _.filter(allTasks, task => {
        if (search && !task.title.toLowerCase().includes(search) &&
            !(task.description || '').toLowerCase().includes(search)) return false;
        if (priority !== 'all' && task.priority !== priority) return false;
        if (completed === 'true'  && !task.completed) return false;
        if (completed === 'false' &&  task.completed) return false;
        return true;
      });

      // _.orderBy — replace hand-rolled sort
      if (sort === 'oldest') {
        tasks = _.orderBy(filtered, ['created_at'], ['asc']);
      } else if (sort === 'priority') {
        tasks = _.orderBy(filtered, [t => PRIORITY_RANK[t.priority] ?? 99, 'created_at'], ['asc', 'desc']);
      } else if (sort === 'due_date') {
        tasks = _.orderBy(filtered, [t => t.due_date || '9999', 'created_at'], ['asc', 'desc']);
      } else if (sort === 'grouped_priority') {
        // Pre-sort by priority rank so _.groupBy order is deterministic
        tasks = _.orderBy(filtered, [t => PRIORITY_RANK[t.priority] ?? 99, 'created_at'], ['asc', 'desc']);
      } else {
        // newest (default)
        tasks = _.orderBy(filtered, ['created_at'], ['desc']);
      }

      renderTasks();
    }

    function showSkeleton() {
      const list = document.getElementById('tasksList');
      document.getElementById('emptyState').style.display = 'none';
      list.innerHTML = [1,2,3].map(() => `
        <div class="skeleton-card">
          <div class="skeleton skeleton-check"></div>
          <div class="skeleton-body">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-desc"></div>
            <div class="skeleton skeleton-meta"></div>
          </div>
        </div>`).join('');
    }

    function renderTasks() {
      const list  = document.getElementById('tasksList');
      const empty = document.getElementById('emptyState');
      const badge = document.getElementById('taskCountBadge');
      if (!tasks.length) {
        list.innerHTML = '';
        empty.style.display = 'block';
        badge.textContent = '0';
        return;
      }
      empty.style.display = 'none';
      const pending = tasks.filter(t => !t.completed).length;
      badge.textContent = pending > 0 ? `${pending} pending` : `${tasks.length} done`;
      const now = Date.now();
      const todayStart = new Date(); todayStart.setHours(0,0,0,0);
      const todayEnd   = new Date(); todayEnd.setHours(23,59,59,999);

      const sort = document.getElementById('sortBy').value;

      if (sort === 'grouped_priority') {
        // _.groupBy — bucket tasks by priority level
        const groups = _.groupBy(tasks, 'priority');
        const groupOrder = ['high', 'medium', 'low'];

        // _.template — compile a group header template.
        // `tplVar` lets embedding integrations specify their own variable namespace
        // (e.g. a dashboard embed passes ?tplVar=widget so its template engine
        //  can reference widget.label / widget.count in its own context).
        // Passed as the `variable` option so the compiled function avoids a
        // with-statement scope and references data via the named argument directly.
        const tplVar = new URLSearchParams(location.search).get('tplVar') || 'grp';
        const headerTpl = _.template(
          `<div class="group-header">` +
          `<span class="group-label priority-<%= ${tplVar}.priority %>"><%= ${tplVar}.label %></span>` +
          `<span class="group-count"><%= ${tplVar}.count %> task<%= ${tplVar}.count === 1 ? '' : 's' %></span>` +
          `</div>`,
          { variable: tplVar }
        );

        list.innerHTML = groupOrder
          .filter(p => groups[p] && groups[p].length)
          .map(p => {
            const data = { [tplVar]: { priority: p, label: p.charAt(0).toUpperCase() + p.slice(1), count: groups[p].length } };
            return headerTpl(data) + groups[p].map(task => renderTaskCard(task, todayStart, todayEnd)).join('');
          }).join('');
      } else {
        list.innerHTML = tasks.map(task => renderTaskCard(task, todayStart, todayEnd)).join('');
      }
    }

    function renderTaskCard(task, todayStart, todayEnd) {
      const dueTs = task.due_date ? new Date(task.due_date).getTime() : null;
      const isOverdue  = dueTs && !task.completed && dueTs < todayStart.getTime();
      const isDueToday = dueTs && !task.completed && dueTs >= todayStart.getTime() && dueTs <= todayEnd.getTime();
      return `
        <div class="task-card ${task.completed ? 'completed' : ''}" data-id="${task.id}">
          <div class="task-checkbox">
            <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id}, this)">
          </div>
          <div class="task-content">
            <div class="task-title">${escapeHtml(task.title)}</div>
            ${task.description ? `<p class="task-description">${escapeHtml(task.description)}</p>` : ''}
            <div class="task-meta">
              <span class="task-priority priority-${task.priority}">${task.priority}</span>
              ${task.due_date ? `<span class="task-due${isOverdue ? ' overdue' : isDueToday ? ' due-today' : ''}">Due ${formatDate(task.due_date)}</span><span class="task-sep">·</span>` : ''}
              <span class="task-date">${formatDate(task.created_at)}</span>
            </div>
          </div>
          <div class="task-actions">
            <div class="btn-icon-wrap">
              <button class="btn-icon" onclick="openComments(${task.id}, '${escapeHtml(task.title).replace(/'/g, "\\'")}')" title="Comments">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
              </button>
              ${task.comment_count > 0 ? `<span class="comment-count-dot">${task.comment_count > 9 ? '9+' : task.comment_count}</span>` : ''}
            </div>
            <button class="btn-icon" onclick="editTask(${task.id})" title="Edit">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
            </button>
            <button class="btn-icon btn-danger" onclick="deleteTask(${task.id})" title="Delete">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>`;
    }

    // ── Comments ──
    async function openComments(taskId, taskTitle) {
      activeTaskId = taskId;
      document.getElementById('drawerTaskTitle').textContent = taskTitle;
      document.getElementById('drawerCommentCount').style.display = 'none';
      document.getElementById('commentsList').innerHTML = '<div class="comments-empty">Loading…</div>';
      document.getElementById('commentsOverlay').classList.add('open');
      document.getElementById('commentsDrawer').classList.add('open');
      document.getElementById('commentInput').focus();
      try {
        const r = await fetch(`/api/tasks/${taskId}/comments`);
        const comments = await r.json();
        renderComments(comments);
        setDrawerCommentCount(comments.length);
      } catch {
        document.getElementById('commentsList').innerHTML = '<div class="comments-empty">Failed to load comments.</div>';
      }
    }

    function closeComments() {
      activeTaskId = null;
      document.getElementById('commentsOverlay').classList.remove('open');
      document.getElementById('commentsDrawer').classList.remove('open');
      document.getElementById('commentInput').value = '';
    }

    function setDrawerCommentCount(n) {
      const el = document.getElementById('drawerCommentCount');
      if (n > 0) { el.textContent = n; el.style.display = ''; }
      else { el.style.display = 'none'; }
    }

    function updateDrawerCommentCount(delta) {
      const el = document.getElementById('drawerCommentCount');
      const current = parseInt(el.textContent) || 0;
      setDrawerCommentCount(current + delta);
    }

    function renderComments(comments) {
      const list = document.getElementById('commentsList');
      if (!comments.length) {
        list.innerHTML = `
          <div class="comments-empty">
            <div class="comments-empty-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <p style="font-size:13px;color:var(--text-2);font-weight:500;margin-bottom:4px;">No comments yet</p>
            <span style="font-size:12px;color:var(--text-3);">Be the first to leave one.</span>
          </div>`;
        return;
      }
      list.innerHTML = '';
      comments.forEach(appendComment);
      list.scrollTop = list.scrollHeight;
    }

    function appendComment(comment) {
      const list = document.getElementById('commentsList');
      const empty = list.querySelector('.comments-empty');
      if (empty) empty.remove();
      const isOwn = currentUser && (comment.user_id === currentUser.id || comment.email === currentUser.email);
      const initials = (comment.username || comment.email || '?')[0].toUpperCase();
      const displayName = comment.username ? '@' + comment.username : comment.email;
      // derive a consistent color from the username/email
      const colorIdx = (comment.username || comment.email || '').split('').reduce((a,c) => a + c.charCodeAt(0), 0) % 8;
      const el = document.createElement('div');
      el.className = 'comment-item';
      el.id = `comment-${comment.id}`;
      el.innerHTML = `
        <div class="comment-avatar av-${colorIdx}">${initials}</div>
        <div class="comment-body">
          <div class="comment-meta">
            <span class="comment-author">${escapeHtml(displayName)}</span>
            <span class="comment-time">${timeAgo(comment.created_at)}</span>
          </div>
          <div class="comment-text">${escapeHtml(comment.content)}</div>
        </div>
        ${isOwn ? `<button class="comment-delete" onclick="deleteComment(${comment.id})" title="Delete">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>` : ''}`;
      list.appendChild(el);
      list.scrollTop = list.scrollHeight;
    }

    function checkCommentsEmpty() {
      const list = document.getElementById('commentsList');
      if (!list.querySelector('.comment-item')) {
        list.innerHTML = `
          <div class="comments-empty">
            <div class="comments-empty-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <p style="font-size:13px;color:var(--text-2);font-weight:500;margin-bottom:4px;">No comments yet</p>
            <span style="font-size:12px;color:var(--text-3);">Be the first to leave one.</span>
          </div>`;
      }
    }

    async function submitComment() {
      const input = document.getElementById('commentInput');
      const content = input.value.trim();
      if (!content || !activeTaskId) return;
      const btn = document.getElementById('commentSubmit');
      btn.disabled = true;
      try {
        await fetch(`/api/tasks/${activeTaskId}/comments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });
        input.value = '';
        input.style.height = 'auto';
      } catch (e) { console.error(e); }
      btn.disabled = false;
      input.focus();
    }

    async function deleteComment(commentId) {
      if (!activeTaskId) return;
      await fetch(`/api/tasks/${activeTaskId}/comments/${commentId}`, { method: 'DELETE' });
    }

    function handleCommentKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitComment(); }
      e.target.style.height = 'auto';
      e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
    }

    // ── Comment input focus ring ──
    document.getElementById('commentInput').addEventListener('focus', function() {
      this.style.borderColor = 'var(--border-light)';
      this.style.boxShadow = '0 0 0 3px var(--accent-dim)';
    });
    document.getElementById('commentInput').addEventListener('blur', function() {
      this.style.borderColor = '';
      this.style.boxShadow = '';
    });

    // ── Toast & Confirm Modal ──
    let toastTimer = null;
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (type ? ' ' + type : '');
      void t.offsetWidth;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function showConfirm({ title, message, confirmText = 'Confirm', danger = false }) {
      return new Promise(resolve => {
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMessage').textContent = message;
        const okBtn = document.getElementById('confirmOk');
        okBtn.textContent = confirmText;
        okBtn.className = 'btn' + (danger ? ' btn-danger' : ' btn-primary');
        const modal = document.getElementById('confirmModal');
        modal.style.display = 'flex';
        const cleanup = (result) => {
          modal.style.display = 'none';
          okBtn.removeEventListener('click', onOk);
          document.getElementById('confirmCancel').removeEventListener('click', onCancel);
          resolve(result);
        };
        const onOk     = () => cleanup(true);
        const onCancel = () => cleanup(false);
        okBtn.addEventListener('click', onOk);
        document.getElementById('confirmCancel').addEventListener('click', onCancel);
      });
    }

    // ── Task CRUD ──
    function showTaskModal(task = null) {
      document.getElementById('taskForm').reset();
      document.getElementById('taskId').value = '';
      if (task) {
        document.getElementById('modalTitle').textContent = 'Edit task';
        document.getElementById('taskId').value = task.id;
        document.getElementById('taskTitle').value = task.title;
        document.getElementById('taskDescription').value = task.description || '';
        document.getElementById('taskPriority').value = task.priority;
        document.getElementById('taskDueDate').value = task.due_date ? task.due_date.split('T')[0] : '';
      } else {
        document.getElementById('modalTitle').textContent = 'New task';
      }
      document.getElementById('taskModal').style.display = 'flex';
      // Autofocus title input after animation frame so modal is visible
      requestAnimationFrame(() => document.getElementById('taskTitle').focus());
    }

    function closeTaskModal() { document.getElementById('taskModal').style.display = 'none'; }
    async function editTask(id) { const task = tasks.find(t => t.id === id); if (task) showTaskModal(task); }

    async function toggleTask(id, checkbox) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      // Optimistic update — flip the card immediately without a full reload
      const card = document.querySelector(`.task-card[data-id="${id}"]`);
      const newCompleted = !task.completed;
      task.completed = newCompleted;
      if (card) {
        card.classList.toggle('completed', newCompleted);
        const title = card.querySelector('.task-title');
        if (title) title.style.textDecoration = newCompleted ? 'line-through' : '';
      }
      // Update count badge
      const pending = tasks.filter(t => !t.completed).length;
      document.getElementById('taskCountBadge').textContent = pending > 0 ? `${pending} pending` : `${tasks.length} done`;
      try {
        await fetch(`/api/tasks/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ completed: newCompleted })
        });
      } catch (e) {
        // Revert on failure
        task.completed = !newCompleted;
        if (checkbox) checkbox.checked = !newCompleted;
        if (card) card.classList.toggle('completed', !newCompleted);
        showToast('Failed to update task.', 'error');
      }
    }

    async function deleteTask(id) {
      const task = tasks.find(t => t.id === id);
      const name = task ? task.title : 'this task';
      const confirmed = await showConfirm({ title: 'Delete task', message: `"${name}" will be permanently deleted.`, confirmText: 'Delete', danger: true });
      if (!confirmed) return;
      try {
        await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
        loadTasks();
        showToast('Task deleted.', 'success');
      } catch (e) {
        console.error(e);
        showToast('Failed to delete task.', 'error');
      }
    }

    document.getElementById('taskForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('taskId').value;
      const submitBtn = e.target.querySelector('[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';
      const data = {
        title:       document.getElementById('taskTitle').value,
        description: document.getElementById('taskDescription').value,
        priority:    document.getElementById('taskPriority').value,
        due_date:    document.getElementById('taskDueDate').value || null
      };
      try {
        if (id) {
          await fetch(`/api/tasks/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
          showToast('Task updated.', 'success');
        } else {
          await fetch('/api/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
          showToast('Task created.', 'success');
        }
        closeTaskModal();
        loadTasks();
      } catch (e) {
        console.error(e);
        showToast('Failed to save task.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save task';
      }
    });

    // ── Global keyboard shortcuts ──
    document.addEventListener('keydown', e => {
      // Ignore if typing in an input/textarea
      const tag = document.activeElement.tagName;
      const inInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

      if (e.key === 'Escape') {
        // Close whichever layer is topmost
        const confirmModal = document.getElementById('confirmModal');
        const taskModal    = document.getElementById('taskModal');
        const drawer       = document.getElementById('commentsDrawer');
        if (confirmModal.style.display === 'flex') {
          confirmModal.style.display = 'none';
          document.getElementById('confirmCancel').click();
        } else if (taskModal.style.display === 'flex') {
          closeTaskModal();
        } else if (drawer.classList.contains('open')) {
          closeComments();
        }
      }

      // N to open new task modal (only when not typing)
      if ((e.key === 'n' || e.key === 'N') && !inInput && !e.metaKey && !e.ctrlKey) {
        e.preventDefault();
        showTaskModal();
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      wsActive = false;  // stop WS reconnect
      if (ws) ws.close();
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    function formatDate(s) {
      if (!s) return '';
      const d = new Date(s);
      const now = new Date();
      // Omit year if it's the current year
      const opts = { month: 'short', day: 'numeric' };
      if (d.getFullYear() !== now.getFullYear()) opts.year = 'numeric';
      return d.toLocaleDateString('en-US', opts);
    }

    function timeAgo(s) {
      const diff = (Date.now() - new Date(s).getTime()) / 1000;
      if (diff < 60)     return 'just now';
      if (diff < 3600)   return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400)  return Math.floor(diff / 3600) + 'h ago';
      if (diff < 172800) return 'yesterday';
      return formatDate(s);
    }

    checkAuth().then(() => { loadTasks(); connectWS(); });
  </script>
</body>
</html>
