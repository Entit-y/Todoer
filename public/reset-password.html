<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Todoer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth">

  <!-- Animated background canvas -->
  <canvas id="bgCanvas"></canvas>

  <div class="auth-container">
    <div class="auth-card">
      <span class="auth-logo">Todoer</span>
      <h1>New password</h1>
      <p class="subtitle" id="subtitle">Choose a strong password for your account</p>

      <form id="resetForm">
        <input type="hidden" id="token">

        <div class="form-group">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" required minlength="6" placeholder="At least 6 characters" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" required placeholder="Repeat new password" autocomplete="new-password">
        </div>

        <div id="message" class="message" style="display:none;margin-bottom:16px;"></div>

        <button type="submit" class="btn btn-primary btn-full">Reset password</button>
      </form>

      <div class="auth-footer">
        <p><a href="/">Back to sign in</a></p>
      </div>
    </div>
  </div>

  <script>
    /* ── Particle / orb background ── */
    (function () {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const orbs = Array.from({ length: 6 }, (_, i) => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: 180 + Math.random() * 160,
        dx: (Math.random() - 0.5) * 0.35,
        dy: (Math.random() - 0.5) * 0.35,
        hue: [220, 240, 260, 200, 250, 230][i],
        alpha: 0.07 + Math.random() * 0.06,
      }));

      const particles = Array.from({ length: 55 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: 0.8 + Math.random() * 1.4,
        dx: (Math.random() - 0.5) * 0.18,
        dy: -0.12 - Math.random() * 0.18,
        alpha: 0.15 + Math.random() * 0.25,
      }));

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        orbs.forEach(o => {
          o.x += o.dx; o.y += o.dy;
          if (o.x < -o.r) o.x = canvas.width + o.r;
          if (o.x > canvas.width + o.r) o.x = -o.r;
          if (o.y < -o.r) o.y = canvas.height + o.r;
          if (o.y > canvas.height + o.r) o.y = -o.r;

          const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
          g.addColorStop(0, `hsla(${o.hue},70%,65%,${o.alpha})`);
          g.addColorStop(1, `hsla(${o.hue},70%,65%,0)`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
          ctx.fill();
        });

        particles.forEach(p => {
          p.x += p.dx; p.y += p.dy;
          if (p.y < -4) { p.y = canvas.height + 4; p.x = Math.random() * canvas.width; }
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
          ctx.fill();
        });

        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ── Form submit ── */
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('subtitle').textContent = 'Invalid or missing reset link.';
      document.getElementById('resetForm').style.display = 'none';
    } else {
      document.getElementById('token').value = token;
      fetch(`/api/auth/verify-reset-token?token=${encodeURIComponent(token)}`)
        .then(r => r.json())
        .then(data => {
          if (!data.valid) {
            document.getElementById('subtitle').textContent = 'This reset link is invalid or has already been used.';
            document.getElementById('resetForm').style.display = 'none';
          }
        })
        .catch(() => {});
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('message');
      const btn = e.target.querySelector('button[type="submit"]');
      msg.style.display = 'none';
      msg.className = 'message';

      const np = document.getElementById('newPassword').value;
      const cp = document.getElementById('confirmPassword').value;

      if (np !== cp) {
        msg.textContent = 'Passwords do not match.';
        msg.className = 'message error';
        msg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Resetting…';

      try {
        const r = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token: document.getElementById('token').value,
            newPassword: np
          })
        });
        const data = await r.json();
        if (r.ok) {
          msg.textContent = 'Password reset successfully. Redirecting…';
          msg.className = 'message success';
          msg.style.display = 'block';
          setTimeout(() => window.location.href = '/', 2000);
        } else {
          msg.textContent = data.error || 'Something went wrong.';
          msg.className = 'message error';
          msg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Reset password';
        }
      } catch {
        msg.textContent = 'An error occurred. Please try again.';
        msg.className = 'message error';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Reset password';
      }
    });
  </script>
</body>
</html>
