<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Todoer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth">

  <!-- Animated background canvas -->
  <canvas id="bgCanvas"></canvas>

  <div class="auth-container">
    <div class="auth-card">
      <span class="auth-logo">Todoer</span>
      <h1>Create account</h1>
      <p class="subtitle">Start managing your tasks today</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="username">Username <span class="optional-tag">(optional)</span></label>
          <input type="text" id="username" name="username" placeholder="johndoe" autocomplete="username">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repeat your password" autocomplete="new-password">
        </div>

        <div id="errorMessage" class="error-message" style="display:none;margin-bottom:16px;"></div>

        <button type="submit" class="btn btn-primary btn-full">Create account</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="/">Sign in</a></p>
      </div>
    </div>
  </div>

  <script>
    /* ── Particle / orb background ── */
    (function () {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const orbs = Array.from({ length: 6 }, (_, i) => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: 180 + Math.random() * 160,
        dx: (Math.random() - 0.5) * 0.35,
        dy: (Math.random() - 0.5) * 0.35,
        hue: [220, 240, 260, 200, 250, 230][i],
        alpha: 0.07 + Math.random() * 0.06,
      }));

      const particles = Array.from({ length: 55 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: 0.8 + Math.random() * 1.4,
        dx: (Math.random() - 0.5) * 0.18,
        dy: -0.12 - Math.random() * 0.18,
        alpha: 0.15 + Math.random() * 0.25,
      }));

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        orbs.forEach(o => {
          o.x += o.dx; o.y += o.dy;
          if (o.x < -o.r) o.x = canvas.width + o.r;
          if (o.x > canvas.width + o.r) o.x = -o.r;
          if (o.y < -o.r) o.y = canvas.height + o.r;
          if (o.y > canvas.height + o.r) o.y = -o.r;

          const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
          g.addColorStop(0, `hsla(${o.hue},70%,65%,${o.alpha})`);
          g.addColorStop(1, `hsla(${o.hue},70%,65%,0)`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
          ctx.fill();
        });

        particles.forEach(p => {
          p.x += p.dx; p.y += p.dy;
          if (p.y < -4) { p.y = canvas.height + 4; p.x = Math.random() * canvas.width; }
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
          ctx.fill();
        });

        requestAnimationFrame(draw);
      }
      draw();
    })();


    /* ── Form submit ── */    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMessage = document.getElementById('errorMessage');
      const btn = e.target.querySelector('button[type="submit"]');
      errorMessage.style.display = 'none';
      if (password !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match';
        errorMessage.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, username: username || undefined })
        });
        const data = await response.json();
        if (!response.ok) {
          errorMessage.textContent = data.error || 'Registration failed';
          errorMessage.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Create account';
          return;
        }
        window.location.href = '/verify-email?email=' + encodeURIComponent(data.email);
      } catch {
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
